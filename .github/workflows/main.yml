name: Deploy GoldFireDragonBrowser (Runner Native)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: https://github.io

    env:
      LANG: "ko_KR.UTF-8"
      LANGUAGE: "ko_KR:ko"
      LC_ALL: "ko_KR.UTF-8"
      TZ: "Asia/Seoul"
      VPN_COUNTRY: "JP"
      TARGET_REGION: "JP"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Korean Locale and Timezone
        run: |
          sudo locale-gen ko_KR.UTF-8
          sudo update-locale LANG=ko_KR.UTF-8
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          date

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install -g cordova
          npm install style-loader css-loader webextension-polyfill node-openvpn --save-dev || true
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          fi

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Connect to Japan VPN (No Auth Required)
        run: |
          sudo openvpn --config OpenVpn/Server/Japan/Configs/IPS_219.100.37.170_udp_1195.ovpn \
                       --dev tun \
                       --redirect-gateway def1 \
                       --resolv-retry infinite \
                       --daemon

      - name: Wait for VPN Tunneling
        run: sleep 15

      - name: Verify VPN Connection
        run: |
          echo "=== 1. 네트워크 인터페이스 검증 ==="
          ip addr
          echo "=== 2. 변경된 일본 외부 IP 정보 ==="
          curl -s --connect-timeout 10 http://ip-api.com || echo "VPN 연결로 인한 네트워크 일시 단절 발생"

      - name: Build Web Application
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -f index.html ]; then
            sed -i '/<head>/a \<script>window.ENV_COUNTRY="JP";window.TARGET_REGION="JP";<\/script>' index.html
          fi

          if npm run | grep -q "build"; then
            npm run build
          fi

          if [ -f server-build.js ]; then
            node server-build.js
          fi

      - name: Cordova Android Build & Copy APK
        run: |
          # 🚨 [수정] 깃헙 러너에 내장된 정확한 Android SDK 경로와 명령어 PATH를 강제 주입합니다.
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          if [ ! -f config.xml ]; then
            echo "config.xml이 발견되지 않아 Cordova 빌드 환경을 자동 임시 구성합니다."
            cd ..
            cordova create vpn-cordova-build com.goldfiredragon.browser GoldFireDragonBrowser
            rm -rf vpn-cordova-build/www
            cp -r GoldFireDragonBrowser-GoogleCloneBased/www vpn-cordova-build/www
            cd vpn-cordova-build
            cordova platform add android --optional || true
            cordova build android --debug
            cd ../GoldFireDragonBrowser-GoogleCloneBased
            APK_SRC="../vpn-cordova-build/platforms/android/app/build/outputs/apk/debug/app-debug.apk"
          else
            cordova platform add android --optional || true
            cordova build android --debug
            APK_SRC="platforms/android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          
          mkdir -p www
          if [ -f "$APK_SRC" ]; then
            cp "$APK_SRC" www/GoldFireDragonBrowser.apk
            cp "$APK_SRC" ./GoldFireDragonBrowser.apk
            echo "APK 파일 리포지토리 내부 복사 대성공 ➡️ ./GoldFireDragonBrowser.apk"
          else
            echo "⚠️ 최종 APK 바이너리를 생성하지 못했습니다."
          fi

      - name: Commit Updated Files & Push APK to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          
          git remote set-url origin https://github.com
          
          git add -u
          if [ -f ./GoldFireDragonBrowser.apk ]; then
            git add ./GoldFireDragonBrowser.apk
          fi
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update existing browser data and APK artifact [skip ci]"
            git push origin main
          else
            echo "변경 사항 및 새 APK 없음"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Disconnect Japan VPN
        if: always()
        run: |
          sudo killall openvpn || true
