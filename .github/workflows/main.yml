name: Deploy GoldFireDragonBrowser

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: https://luckysexysuccubusqueen135age.github.io/GoldFireDragonBrowser-GoogleCloneBased/

    env:
      LANG: "ko_KR.UTF-8"
      LANGUAGE: "ko_KR:ko"
      LC_ALL: "ko_KR.UTF-8"
      TZ: "Asia/Seoul"
      VPN_COUNTRY: "JP"
      TARGET_REGION: "JP"

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Korean Locale and Timezone
        run: |
          sudo locale-gen ko_KR.UTF-8
          sudo update-locale LANG=ko_KR.UTF-8
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          date

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install -g cordova
          npm install style-loader css-loader webextension-polyfill node-openvpn --save-dev || true
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          fi

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Connect to Japan VPN
        run: |
          sudo openvpn --config OpenVpn/Server/Japan/Configs/IPS_219.100.37.170_udp_1195.ovpn --daemon

      - name: Wait for VPN
        run: sleep 5

      - name: Verify VPN
        run: |
          ip addr
          curl -s https://ifconfig.me || echo "IP check skipped"

      - name: Build Web Application
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -f index.html ]; then
            sed -i '/<head>/a \<script>window.ENV_COUNTRY="JP";window.TARGET_REGION="JP";<\/script>' index.html
          fi

          if npm run | grep -q "build"; then
            npm run build
          fi

          if [ -f server-build.js ]; then
            node server-build.js
          fi

      - name: Cordova Android Build
        run: |
          if [ -f config.xml ]; then
            cordova platform add android --optional || true
            cordova build android --debug
          fi

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "chore: update existing browser data [skip ci]"
            git push origin main
          else
            echo "No changes"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
