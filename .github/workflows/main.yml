name: Deploy GoldFireDragonBrowser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # 기존 파일을 수정하여 깃허브 리포지토리에 push하기 위해 필수
  pages: write      # GitHub Pages 배포를 위해 필수
  id-token: write

concurrency:
  group: "pages"
  # 배포 대기 버그 전면 차단
  cancel-in-progress: true 

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      # [주소 고정] 질문자님이 명시한 정확한 GitHub Pages 주소 링크
      url: https://github.io
    runs-on: ubuntu-latest

    steps:
    # 1. 레포지토리 소스코드 내려받기
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 2. Node.js 구동 환경 세팅 (락파일 캐시 에러 방지를 위해 cache 옵션 제거 상태 유지)
    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. 코르도바 및 엔진 컴파일을 위한 JDK 17 환경 구축
    - name: Set up JDK 17 for Cordova Android Build
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 4. 의존성 패키지 및 크롬/파이어폭스 익스텐션 스토어 호환 필수 로더/폴리필 패키지 설치
    - name: Install Dependencies
      run: |
        npm install -g cordova
        npm install style-loader css-loader webextension-polyfill --save-dev || true
        if [ -f package.json ]; then
          npm install
        fi

    # 5. 가상 머신 리눅스 시스템에 OpenVPN 클라이언트 설치
    - name: Install Linux OpenVPN Client
      run: |
        sudo apt-get update
        sudo apt-get install -y openvpn

    # 6. [경로 고정] 지정하신 정확한 VPN 설정 파일 경로 내부에서 무작위 선택 후 구동
    # 미국 IP 누수를 완벽 차단하기 위한 하이재킹 플래그 및 인터페이스 초기화 옵션 적용
    - name: Connect to Random OpenVPN JP Config
      run: |
        CONFIG_DIR="OpenVpn/Server/Japan/Configs"
        CONFIG_FILES=($(ls $CONFIG_DIR/*.ovpn))
        
        RANDOM_INDEX=$((RANDOM % ${#CONFIG_FILES[@]}))
        SELECTED_OVPN=${CONFIG_FILES[$RANDOM_INDEX]}
        
        echo "선택되어 실행되는 OpenVPN JP 설정 파일: $SELECTED_OVPN"
        
        # 가상 어댑터 노이즈를 지우고 라우팅을 강제 병합하여 데몬 구동합니다.
        sudo openvpn \
          --config "$SELECTED_OVPN" \
          --dev tun \
          --redirect-gateway def1 \
          --dhcp-option DNS 8.8.8.8 \
          --daemon vpn_instance

    # 7. [핵심 교정] 가상 컴퓨터의 공인 IP 국가 코드가 진짜 일본(JP)으로 변할 때까지 무한 체킹 루프 가동
    # 미국(US)으로 탈출하는 현상이 발견되면 최대 12회(총 60초) 동안 지속적으로 갱신을 기다리며 추적합니다.
    - name: Wait and Verify Japanese Network Tunneling
      run: |
        echo "🌐 일본 VPN망 터널링 최종 유효성 검사 시작..."
        for i in {1..12}; do
          echo "⏱️ 네트워크 국가 추적 확인 중... (시도 $i/12)"
          
          # ipinfo.io에서 현재 국가 코드 2자리 추출 (예: US, JP)
          CURRENT_COUNTRY=$(curl -s https://ipinfo.io | jq -r '.country' || echo "UNKNOWN")
          echo "📍 현재 할당된 가상 IP 국가: $CURRENT_COUNTRY"
          
          if [ "$CURRENT_COUNTRY" = "JP" ]; then
            echo "🚀 [성공] 네트워크망이 진짜 일본(JP)으로 정상 우회 조치되었습니다!"
            curl -s https://ipinfo.io
            exit 0
          fi
          
          echo "⚠️ 현재 아직 미국(US) 또는 연결 대기 중입니다. 5초 후 재조회합니다."
          sleep 5
        done
        
        echo "❌ [실패] 일본 VPN 연결 노드가 터널링 확보에 최종 실패했습니다. (다음 푸시 때 다른 파일 자동 매칭 유도)"
        exit 1

    # 8. Webpack 번들링 및 Express/Supabase/OneSpace AI 빌드 스크립트 실행
    - name: Build Web Application
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
      run: |
        # Webpack 컴파일 실행
        if npm run | grep -q "build"; then
          npm run build
        fi
        
        # Express 데이터 수집이나 Supabase/OneSpace 연동 빌드 스크립트가 있다면 구동
        if [ -f server-build.js ]; then
          node server-build.js
        fi

    # 9. 크롬/파이어폭스 듀얼 엔진 주입 및 웹익스텐션 API 프레임워크 패치 연동
    - name: Inject Engines, WebExtension Framework & Build Cordova
      run: |
        if [ -f config.xml ]; then
          cordova platform add android --optional || true
          
          echo "📦 크롬/파이어폭스 엔진, 인앱 브라우저 및 웹익스텐션 API 프레임워크 패치 주입..."
          cordova plugin add cordova-plugin-inappbrowser --save || true
          cordova plugin add cordova-plugin-inappwebview --save || true
          cordova plugin add cordova-plugin-geckoview --save || true
          cordova plugin add cordova-plugin-webextensions --save || true
          cordova plugin add cordova-plugin-webextension-framework --save || true
          
          cordova build android --debug
        fi

    # 10. 수정/최신화된 기존 파일들의 변경 내역만 감지하여 갱신(Update) 처리
    - name: Commit and Push Updated Files to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # 변경(수정/업데이트)된 파일만 스테이징에 반영
        git add -u
        
        # 업데이트 내역이 있는지 체크 후 커밋/푸시 진행
        if ! git diff --cached --quiet; then
          git commit -m "chore: update existing browser data via Japan VPN [skip ci]"
          git push origin main
        else
          echo "업데이트 내역이 변경되지 않아 과정을 건너넙니다."
        fi

    # 11. 배포할 결과물 자원을 배포 아티팩트로 전송
    - name: Upload Static Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' 

    # 12. 최신 v5 규격 엔진으로 내 GitHub Pages 주소에 최종 배포 발행
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
