name: Deploy GoldFireDragonBrowser (Runner Native)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: https://github.io

    env:
      LANG: "ko_KR.UTF-8"
      LANGUAGE: "ko_KR:ko"
      LC_ALL: "ko_KR.UTF-8"
      TZ: "Asia/Seoul"
      VPN_COUNTRY: "JP"
      TARGET_REGION: "JP"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Korean Locale and Timezone
        run: |
          sudo locale-gen ko_KR.UTF-8
          sudo update-locale LANG=ko_KR.UTF-8
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          date

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install -g cordova
          npm install style-loader css-loader webextension-polyfill node-openvpn --save-dev || true
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          fi

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Connect to Japan VPN
        run: |
          # --dev tun 및 --redirect-gateway def1 옵션으로 러너의 모든 트래픽을 일본 VPN으로 강제 유도합니다.
          sudo openvpn --config OpenVpn/Server/Japan/Configs/IPS_219.100.37.170_udp_1195.ovpn --dev tun --redirect-gateway def1 --daemon

      - name: Wait for VPN Tunneling
        run: sleep 15 # 러너 네트워크 인터페이스가 완전히 바뀔 때까지 대기

      - name: Verify VPN Connection
        run: |
          echo "=== [확인] 현재 러너의 네트워크 인터페이스 ==="
          ip addr
          echo "=== [확인] 우회된 외부 IP 및 국가 정보 ==="
          curl -s http://ip-api.com || echo "IP 우회 확인 실패 (인터넷 연결 끊김 우려)"

      - name: Build Web Application
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -f index.html ]; then
            sed -i '/<head>/a \<script>window.ENV_COUNTRY="JP";window.TARGET_REGION="JP";<\/script>' index.html
          fi

          if npm run | grep -q "build"; then
            npm run build
          fi

          if [ -f server-build.js ]; then
            node server-build.js
          fi

      - name: Cordova Android Build & Copy APK
        run: |
          if [ -f config.xml ]; then
            # 러너에 내장된 Android SDK 경로를 명시적으로 주입
            export ANDROID_HOME=$ANDROID_HOME_ROOT
            
            cordova platform add android --optional || true
            cordova build android --debug
            
            # 빌드된 APK 결과물을 정적 웹 배포 폴더(www)로 복사
            mkdir -p www
            if [ -f platforms/android/app/build/outputs/apk/debug/app-debug.apk ]; then
              cp platforms/android/app/build/outputs/apk/debug/app-debug.apk www/GoldFireDragonBrowser.apk
              echo "APK 복사 성공 ➡️ www/GoldFireDragonBrowser.apk"
            else
              echo "⚠️ APK 빌드 파일을 찾을 수 없습니다."
            fi
          fi

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "chore: update existing browser data [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'www' # 정적 웹과 APK가 담긴 www 폴더만 아티팩트로 업로드

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Disconnect Japan VPN
        if: always()
        run: |
          sudo killall openvpn || true
