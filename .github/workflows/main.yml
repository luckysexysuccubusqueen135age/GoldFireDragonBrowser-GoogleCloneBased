name: Deploy GoldFireDragonBrowser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # 기존 파일을 수정하여 깃허브 리포지토리에 push하기 위해 필수
  pages: write      # GitHub Pages 배포를 위해 필수
  id-token: write

concurrency:
  group: "pages"
  # 배포가 밀려 무한 대기 후 취소되는 현상을 전면 방지하기 위해 이전 빌드를 강제 취소하고 새 작업을 즉시 밀어 넣습니다.
  cancel-in-progress: true 

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      # [주소 고정] 질문자님이 명시한 정확한 GitHub Pages 주소 링크 완벽 고정
      url: https://github.io
    runs-on: ubuntu-latest

    steps:
    # 1. 레포지토리 소스코드 내려받기
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 2. Node.js 구동 환경 세팅 (락파일 캐시 에러 방지를 위해 cache 옵션 제거 상태 엄격히 유지)
    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. 코르도바 컴파일 및 자바 가상 머신 환경 구동을 위한 JDK 17 빌드 스택 세팅
    - name: Set up JDK 17 for Cordova Android Build
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 4. 의존성 패키지 및 폰트/웹익스텐션 스토어 호환 필수 로더/폴리필 라이브러리 전역 주입
    - name: Install Dependencies
      run: |
        npm install -g cordova
        npm install style-loader css-loader webextension-polyfill --save-dev || true
        if [ -f package.json ]; then
          npm install
        fi

    # 5. 가상 머신 리눅스 시스템에 OpenVPN 클라이언트 라이브러리 설치
    - name: Install Linux OpenVPN Client
      run: |
        sudo apt-get update
        sudo apt-get install -y openvpn

    # 6. [경로 고정] 지정하신 정확한 경로 내의 파일들을 무작위 추출하여 백그라운드 매칭 구동
    - name: Connect to Random OpenVPN JP Config
      run: |
        CONFIG_DIR="OpenVpn/Server/Japan/Configs"
        CONFIG_FILES=($(ls $CONFIG_DIR/*.ovpn))
        
        RANDOM_INDEX=$((RANDOM % ${#CONFIG_FILES[@]}))
        SELECTED_OVPN=${CONFIG_FILES[$RANDOM_INDEX]}
        
        echo "선택되어 실행되는 OpenVPN JP 설정 파일: $SELECTED_OVPN"
        
        # 데몬(--daemon) 모드로 완벽한 백그라운드 터널링을 이행합니다.
        sudo openvpn --config "$SELECTED_OVPN" --daemon vpn_instance
        
        # 터널링 안정화를 위해 12초간 대기합니다.
        sleep 12

    # 7. 일본 VPN망 연결 상태 확인 (IP 정보 출력 검증)
    - name: Verify Japanese Network Tunneling
      run: curl https://ipinfo.io

    # 8. Webpack 번들링 및 Express/Supabase/OneSpace AI 빌드 스크립트 가동
    - name: Build Web Application
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
      run: |
        # Webpack 컴파일 실행 (아래 통합 설정 파일을 자동으로 타깃팅함)
        if npm run | grep -q "build"; then
          npm run build
        fi
        
        # Express 데이터 수집 및 백엔드 런타임 갱신 스크립트 실행
        if [ -f server-build.js ]; then
          node server-build.js
        fi

    # 9. 크롬/파이어폭스 듀얼 엔진 주입, 인앱 브라우저 및 웹익스텐션 API 프레임워크 패치 연동
    - name: Inject Engines, WebExtension Framework & Build Cordova
      run: |
        if [ -f config.xml ]; then
          cordova platform add android --optional || true
          
          echo "📦 크롬/파이어폭스 엔진, 인앱 브라우저 및 웹익스텐션 API 프레임워크 패치 주입..."
          cordova plugin add cordova-plugin-inappbrowser --save || true
          cordova plugin add cordova-plugin-inappwebview --save || true
          cordova plugin add cordova-plugin-geckoview --save || true
          cordova plugin add cordova-plugin-webextensions --save || true
          cordova plugin add cordova-plugin-webextension-framework --save || true
          
          cordova build android --debug
        fi

    # 10. 수정/최신화된 기존 파일들의 변경 내역만 감지하여 레포지토리에 깨끗하게 업데이트(Update) 처리
    - name: Commit and Push Updated Files to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # 변경(수정/업데이트)된 파일 내용만 정확히 반영
        git add -u
        
        # 업데이트 내역이 있을 때만 커밋/푸시 진행 ([skip ci]로 무한루프 방어)
        if ! git diff --cached --quiet; then
          git commit -m "chore: update existing browser data via Japan VPN [skip ci]"
          git push origin main
        else
          echo "업데이트 내역이 변경되지 않아 과정을 건너넙니다."
        fi

    # 11. 배포할 결과물 자원을 배포 아티팩트로 전송
    - name: Upload Static Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' 

    # 12. 최신 v5 규격 배포 엔진으로 내 GitHub Pages 주소에 릴리즈 퍼블리싱 발행
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
