name: Deploy GoldFireDragonBrowser (Runner Native)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      # 🚨 요청하신 실제 동작 주소로 완벽하게 고정 완료했습니다.
      url: https://luckysexysuccubusqueen135age.github.io/GoldFireDragonBrowser-GoogleCloneBased/

    env:
      LANG: "ko_KR.UTF-8"
      LANGUAGE: "ko_KR:ko"
      LC_ALL: "ko_KR.UTF-8"
      TZ: "Asia/Seoul"
      VPN_COUNTRY: "JP"
      TARGET_REGION: "JP"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Korean Locale and Timezone
        run: |
          sudo locale-gen ko_KR.UTF-8
          sudo update-locale LANG=ko_KR.UTF-8
          sudo ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime
          date

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install -g cordova
          npm install style-loader css-loader webextension-polyfill node-openvpn --save-dev || true
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          fi

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Connect to Japan VPN (No Auth Required)
        run: |
          # 💡 에러의 원인이던 --cap-add 플래그를 삭제하고 Native 환경에 맞춤 수정했습니다.
          sudo openvpn --config OpenVpn/Server/Japan/Configs/IPS_219.100.37.170_udp_1195.ovpn \
                       --dev tun \
                       --redirect-gateway def1 \
                       --resolve-retry infinite \
                       --daemon

      - name: Wait for VPN Tunneling
        run: sleep 15

      - name: Verify VPN Connection
        run: |
          echo "=== 1. 네트워크 인터페이스 검증 ==="
          ip addr
          echo "=== 2. 변경된 일본 외부 IP 정보 ==="
          curl -s --connect-timeout 10 http://ip-api.com || echo "VPN 연결로 인한 네트워크 일시 단절 발생"

      - name: Build Web Application
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ONESPACE_AI_API_KEY: ${{ secrets.ONESPACE_AI_API_KEY }}
          NODE_ENV: production
        run: |
          if [ -f index.html ]; then
            sed -i '/<head>/a \<script>window.ENV_COUNTRY="JP";window.TARGET_REGION="JP";<\/script>' index.html
          fi

          if npm run | grep -q "build"; then
            npm run build
          fi

          if [ -f server-build.js ]; then
            node server-build.js
          fi

      - name: Cordova Android Build & Copy APK
        run: |
          if [ -f config.xml ]; then
            export ANDROID_HOME=$ANDROID_HOME_ROOT
            export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
            
            cordova platform add android --optional || true
            cordova build android --debug
            
            mkdir -p www
            if [ -f platforms/android/app/build/outputs/apk/debug/app-debug.apk ]; then
              cp platforms/android/app/build/outputs/apk/debug/app-debug.apk www/GoldFireDragonBrowser.apk
              cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ./GoldFireDragonBrowser.apk
              echo "APK 파일 리포 내부 복사 성공 ➡️ ./GoldFireDragonBrowser.apk"
            else
              echo "⚠️ APK 결과물이 존재하지 않습니다."
            fi
          fi

      - name: Commit Updated Files & Push APK to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          
          git remote set-url origin https://github.com
          
          git add -u
          if [ -f ./GoldFireDragonBrowser.apk ]; then
            git add ./GoldFireDragonBrowser.apk
          fi
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update existing browser data and APK artifact [skip ci]"
            git push origin main
          else
            echo "변경 사항 및 새 APK 없음"
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Disconnect Japan VPN
        if: always()
        run: |
          sudo killall openvpn || true
