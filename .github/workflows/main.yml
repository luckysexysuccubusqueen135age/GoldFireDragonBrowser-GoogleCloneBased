name: GoldFireDragon Streamlined Auto Builder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-express-server:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 깃허브 리포지토리 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 클라우드 환경에 Node.js LTS 런타임 설치 (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 시스템 필수 유틸리티 및 바이너리 설치 (unzip, openvpn)
        run: sudo apt-get update && sudo apt-get install -y unzip openvpn curl jq

      - name: 4. 빌드 규격용 package.json 강제 자동 생성
        run: |
          cat << 'EOF' > package.json
          {
            "name": "goldfiredragon-browser-clone",
            "version": "1.0.0",
            "main": "bundle.js",
            "scripts": {
              "start": "ts-node src/server.ts",
              "build": "webpack"
            },
            "dependencies": {
              "@supabase/supabase-js": "^2.43.0",
              "express": "^4.19.2"
            },
            "devDependencies": {
              "@types/express": "^4.17.21",
              "@types/node": "^20.12.7",
              "shx": "^0.3.4",
              "ts-loader": "^9.5.1",
              "ts-node": "^10.9.2",
              "typescript": "^5.4.5",
              "webpack": "^5.91.0",
              "webpack-cli": "^5.1.4"
            }
          }
          EOF

      - name: 5. No Dist 규격용 webpack.config.js 강제 자동 생성
        run: |
          cat << 'EOF' > webpack.config.js
          const path = require('path'); 
          module.exports = { 
            entry: './src/app.ts', 
            mode: 'production', 
            target: 'web', 
            module: { rules: [{ test: /\.tsx?$/, use: 'ts-loader', exclude: /node_modules/ }] }, 
            resolve: { extensions: ['.ts', '.js'] }, 
            output: { filename: 'bundle.js', path: path.resolve(__dirname, './') } 
          };
          EOF

      - name: 6. 타입스크립트 컴파일 사양서 tsconfig.json 강제 자동 생성
        run: |
          cat << 'EOF' > tsconfig.json
          {
            "compilerOptions": {
              "target": "es2020",
              "module": "commonjs",
              "lib": ["dom", "es2020"],
              "esModuleInterop": true,
              "skipLibCheck": true,
              "moduleResolution": "node"
            },
            "include": ["src/**/*"]
          }
          EOF

      - name: 7. 리포지토리 파일 기준 실제 npm install 실행
        run: npm install

      - name: 8. 저장소 보관소 내 2개 핵심 OpenVPN ZIP 압축 자동 해제
        run: |
          mkdir -p install/package/nodejs/files/zip
          unzip -o install/package/nodejs/files/zip/node-openvpn-master.zip -d ./ || echo "ZIP 생략"
          unzip -o install/package/nodejs/files/zip/ovpn-nodejs-master.zip -d ./ || echo "ZIP 생략"

      - name: 9. 필수 소스코드 폴더 및 파일 강제 보정 생성
        run: |
          mkdir -p src
          if [ ! -f src/app.ts ]; then echo "console.log('GoldFireDragon Online');" > src/app.ts; fi

      - name: 10. 설치된 라이브러리 기반 웹팩 번들링 가동
        run: npx webpack --mode production || echo "웹팩 컴파일 스킵"

      - name: 12. Cordova APK 컴파일 구조용 www 폴더 자원 동기화
        run: mkdir -p www && cp index.html bundle.js www/ || true

      - name: 13. 생성된 자원들을 깃허브 원본 레포지토리에 물리적 파일로 저장 (Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          mkdir -p src
          cat << 'EOF' > src/server.ts
          import express from 'express'; 
          import path from 'path'; 
          const app = merge; 
          app.use(express.static(path.join(__dirname, '../'))); 
          app.get('*', (req, res) => { res.sendFile(path.join(__dirname, '../index.html')); }); 
          app.listen(3000);
          EOF
          git add package.json webpack.config.js tsconfig.json bundle.js index.html src/server.ts www/ || true
          git commit -m "chore: 리포지토리 루트 구성 무결성 연동 완료" || echo "변경사항 없음"
          git push origin main || echo "푸시 스킵"

      - name: 14. Node.js + Express 실제 라이브 백엔드 서버 기동
        run: npx ts-node src/server.ts & sleep 5
