name: GoldFireDragon Express Server Full Engine

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-express-server:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 깃허브 리포지토리 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. 클라우드 환경에 Node.js LTS 런타임 설치 (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 시스템 필수 유틸리티 및 바이너리 설치 (unzip, openvpn)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip openvpn curl jq

      # ────────────────────────────────────────────────────────────
      # 🛠️ [에러 방지]: 리포지토리 package.json 기준 npm install 완벽 구동
      - name: 4. 리포지토리 파일 기준 실제 npm install 실행
        run: npm install
      # ────────────────────────────────────────────────────────────

      # ────────────────────────────────────────────────────────────
      # 🛠️ [내장 자원 병합]: 리포지토리에 저장된 2개의 OpenVPN ZIP 모듈 압축 자동 해제
      - name: 5. 내장 ZIP 자원 해제 및 루트 세팅 (node-openvpn + ovpn-nodejs)
        run: |
          unzip -o install/package/nodejs/files/zip/node-openvpn-master.zip -d ./
          unzip -o install/package/nodejs/files/zip/ovpn-nodejs-master.zip -d ./
      # ────────────────────────────────────────────────────────────

      # 🛠️ [에러 방지]: npx를 명시하여 로컬 컴파일러가 유실되더라도 강제 웹팩 빌드 수행 (No Dist)
      - name: 6. 설치된 라이브러리 기반 웹팩 빌드 (No Dist 규격: 루트에 bundle.js 파일 생성)
        run: npx webpack --mode production

      - name: 7. Cordova APK 규격 컴패티블 www 백업 폴더 자동 생성 및 동기화
        run: |
          mkdir -p www
          cp index.html bundle.js www/
          mkdir -p www/OpenVpn/Server/Japan/Configs
          cp -r OpenVpn/Server/Japan/Configs/. www/OpenVpn/Server/Japan/Configs/ || true

      # ────────────────────────────────────────────────────────────
      # 🛠️ [에러 방지]: ts-node가 로컬 전역에서 충돌 나지 않도록 npx로 Express 서버 강제 기동
      - name: 8. Node.js + Express 실제 라이브 서버 기동
        run: |
          # ts-node 컴파일 오류 및 꼬임 방지를 위해 npx ts-node로 명시적 안전 실행
          npx ts-node src/server.ts &
          sleep 5
      # ────────────────────────────────────────────────────────────

      # ────────────────────────────────────────────────────────────
      # 🛠️ [터널링 개통]: 가상 머신 안의 Express 웹페이지를 외부망에 연결하는 인프라 가동
      - name: 9. 외부 접속용 가상 라이브 호스팅 주소 임시 개통 및 링크 출력
        run: |
          curl -s https://amazonaws.com | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          # 포트 3000번으로 오픈된 Express 서버를 임시 익명 터널 주소로 중계합니다.
          ngrok http 3000 --log=stdout &
          sleep 5
          
          echo "────────────────────────────────────────────────────────────"
          echo "🚀 Node.js + Express 서버가 성공적으로 가동되어 웹페이지가 구동 중입니다!"
          echo "아래에 출력되는 public_url 링크 주소로 접속하세요."
          echo "────────────────────────────────────────────────────────────"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels.public_url' || true
      # ────────────────────────────────────────────────────────────
