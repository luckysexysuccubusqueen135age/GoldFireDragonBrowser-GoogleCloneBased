<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>GoldFireDragon Browser</title>
    <script src="https://tailwindcss.com"></script><link href="https://googleapis.com" rel="stylesheet">
    <style>body { font-family: 'Noto Sans KR', sans-serif; background: #0a0010 url('images/GoldFireDragonBrowser_home_page.jpg') center / cover no-repeat fixed; overflow-x: hidden; } .gold-title { font-family: 'Cinzel', serif; background: linear-gradient(135deg, #ffe066 0%, #f59e0b 50%, #b45309 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }</style>
</head>
<body class="text-purple-100 min-h-screen flex flex-col justify-between p-4 bg-space">
    <header class="flex flex-wrap justify-between items-center gap-4 bg-purple-950/40 backdrop-blur-md border border-purple-500/20 rounded-2xl p-4 shadow-2xl">
        <div class="text-xs font-semibold text-purple-200">🇯🇵 Japan WiFi IP Connected • Proxy Active</div>
        <div class="flex items-center gap-3"><button class="bg-purple-900/40 border border-purple-500/30 rounded-xl px-4 py-2 text-xs">Proxy Settings</button><button class="bg-purple-900/40 border border-purple-500/30 rounded-xl px-4 py-2 text-xs">Bookmarks</button></div>
    </header>
    <main class="flex-1 flex flex-col items-center justify-center my-8">
        <div class="text-center mb-8"><h1 class="gold-title text-4xl md:text-6xl font-black tracking-widest mb-2">GOLD FIRE DRAGON</h1><p class="text-purple-400 text-xs tracking-[0.3em] uppercase font-light">Google Clone Browser System Base</p></div>
        <div class="w-full max-w-2xl bg-purple-950/30 border border-purple-500/20 rounded-3xl p-6 shadow-2xl backdrop-blur-sm">
            <div class="flex items-center gap-3 bg-black/40 rounded-2xl px-4 py-3 border border-purple-500/30"><span class="text-purple-400">🔍</span><input type="text" id="browser-search-input" placeholder="Google 검색 또는 웹 주소 입력 (CroxyProxy 우회 연동)" class="w-full bg-transparent text-sm text-purple-100 outline-none"></div>
        </div>
    </main>
    <footer class="text-center text-[10px] text-purple-400/40 py-4 border-t border-purple-500/10">&copy; 2026 GoldFireDragon Browser</footer>
    <div id="vpn-floating-widget" style="position: fixed; bottom: 30px; right: 30px; z-index: 999999 !important; display: flex; align-items: center; gap: 12px; background: #0c0418; border: 2px solid #10b981; border-radius: 16px; padding: 12px 18px; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); font-family: sans-serif;">
        <div style="display: flex; flex-direction: column; gap: 4px;"><span style="color: #e9d5ff; font-size: 11px; font-weight: bold;">🇯🇵 JAPAN PROXY VPN</span><select id="vpn-server-selector" style="background: #1e1b4b; color: #f3e8ff; font-size: 11px; border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 6px; padding: 4px 8px; outline: none; cursor: pointer; font-weight: bold;"><option value="IPS_219.100.37.105_tcp_443.ovpn">일본 서버 #1</option><option value="FOV_Japan_219.100.37.170_tcp.ovpn">일본 서버 #2</option></select></div>
        <button id="vpn-master-btn" style="background: #059669; color: #ffffff; font-weight: 900; font-size: 11px; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; text-transform: uppercase;">연결됨</button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{
            const w=document.getElementById("vpn-floating-widget"),b=document.getElementById("vpn-master-btn"),s=document.getElementById("vpn-server-selector");
            let active=true;
            b.addEventListener("click",(e)=>{
                e.stopPropagation();
                if(active){ active=false; b.innerText="연결하기"; b.style.backgroundColor="#dc2626"; w.style.borderColor="rgba(168, 85, 247, 0.6)"; fetch("/api/vpn/disconnect",{method:"POST"}).catch(()=>{}); }
                else { active=true; b.innerText="연결됨"; b.style.backgroundColor="#059669"; w.style.borderColor="#10b981"; fetch("/api/vpn/connect-japan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({vpnFileName:s.value})}).catch(()=>{}); }
            });
        });
    </script>
    <script src="cordova.js"></script><script src="bundle.js"></script>
</body>
</html>
