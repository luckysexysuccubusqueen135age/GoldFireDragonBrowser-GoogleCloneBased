  <!-- ══════════════════════════════════════════
       JAPAN GEOSPOOF — 최우선 실행 (DOM 이전)
       ──────────────────────────────────────────
       navigator.geolocation, navigator.language,
       Intl timezone 전부 일본(도쿄)으로 오버라이드
  ══════════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    /* ── 도쿄 좌표 ── */
    var TOKYO = {
      lat: 35.6762,
      lng: 139.6503,
      accuracy: 18,
      altitude: 40,
      altAccuracy: 5,
      heading: null,
      speed: null
    };

    /* ── navigator.geolocation 완전 오버라이드 ── */
    try {
      var fakePosition = {
        coords: {
          latitude:         TOKYO.lat,
          longitude:        TOKYO.lng,
          accuracy:         TOKYO.accuracy,
          altitude:         TOKYO.altitude,
          altitudeAccuracy: TOKYO.altAccuracy,
          heading:          TOKYO.heading,
          speed:            TOKYO.speed
        },
        timestamp: Date.now()
      };

      var fakeGeo = {
        getCurrentPosition: function (success, error, opts) {
          fakePosition.timestamp = Date.now();
          setTimeout(function () { success(fakePosition); }, 80);
        },
        watchPosition: function (success, error, opts) {
          fakePosition.timestamp = Date.now();
          setTimeout(function () { success(fakePosition); }, 80);
          return 99;
        },
        clearWatch: function () {}
      };

      if (navigator.geolocation) {
        Object.defineProperty(navigator, 'geolocation', {
          get: function () { return fakeGeo; },
          configurable: true
        });
      }
    } catch(e) {}

    /* ── navigator.language / languages 오버라이드 ── */
    try {
      Object.defineProperty(navigator, 'language', {
        get: function () { return 'ja-JP'; },
        configurable: true
      });
      Object.defineProperty(navigator, 'languages', {
        get: function () { return ['ja-JP', 'ko-KR', 'en-US']; },
        configurable: true
      });
    } catch(e) {}

    /* ── Intl.DateTimeFormat 기본 타임존 오버라이드 ── */
    try {
      var _DateTimeFormat = Intl.DateTimeFormat;
      Intl.DateTimeFormat = function (locale, opts) {
        opts = Object.assign({ timeZone: 'Asia/Tokyo' }, opts || {});
        return new _DateTimeFormat(locale || 'ja-JP', opts);
      };
      Intl.DateTimeFormat.prototype        = _DateTimeFormat.prototype;
      Intl.DateTimeFormat.supportedLocalesOf = _DateTimeFormat.supportedLocalesOf;
    } catch(e) {}

    /* ── Date 로케일 기본값 오버라이드 ── */
    try {
      var _toLocaleDateString = Date.prototype.toLocaleDateString;
      var _toLocaleTimeString = Date.prototype.toLocaleTimeString;
      var _toLocaleString     = Date.prototype.toLocaleString;
      Date.prototype.toLocaleDateString = function (l, o) {
        return _toLocaleDateString.call(this, l || 'ja-JP', Object.assign({ timeZone: 'Asia/Tokyo' }, o || {}));
      };
      Date.prototype.toLocaleTimeString = function (l, o) {
        return _toLocaleTimeString.call(this, l || 'ja-JP', Object.assign({ timeZone: 'Asia/Tokyo' }, o || {}));
      };
      Date.prototype.toLocaleString = function (l, o) {
        return _toLocaleString.call(this, l || 'ja-JP', Object.assign({ timeZone: 'Asia/Tokyo' }, o || {}));
      };
    } catch(e) {}

  })();
  </script>

  <script>
    /* ══════════════════════════════════════════
       JAPAN GEO CONFIG
    ══════════════════════════════════════════ */
    var JP_GEO = {
      searchBase:   'https://www.google.co.jp/search',
      suggestBase:  'https://suggestqueries.google.com/complete/search',
      params: {
        gl:      'jp',
        hl:      'ko',
        cr:      'countryJP',
        lr:      'lang_ko',
        pws:     '0',
        nfpr:    '1',
        filter:  '0',
        uule:    'w+CAIQICIbVG9reW8sIFRva3lvIFByZWZlY3R1cmUsIEphcGFu'
      },
      coords: { lat: 35.6762, lng: 139.6503 },
      tz:      'Asia/Tokyo',
      locale:  'ja-JP'
    };

    var privacyModeOn = true;

    /* ── 검색 URL 생성 ── */
    function buildSearchUrl(query, lucky) {
      var p = Object.assign({}, JP_GEO.params);
      p.q      = query;
      p.safe   = 'off';
      if (lucky) p.btnI = '1';
      var qs = Object.keys(p).map(function(k){
        return encodeURIComponent(k) + '=' + encodeURIComponent(p[k]);
      }).join('&');
      return JP_GEO.searchBase + '?' + qs;
    }

    /* ══════════════════════════════════════════
       SHADOW DOM + FETCH API 브라우저 구현
    ══════════════════════════════════════════ */

    const browserContainer = document.getElementById('browser-container');
    const mainContent = document.getElementById('main-content');
    const pageLoader = document.getElementById('page-loader');
    let shadowRoot = null;

    /**
     * Shadow DOM 초기화 및 페이지 로드
     */
    async function loadPageInShadowDOM(url) {
      try {
        // 로딩 인디케이터 표시
        pageLoader.classList.add('active');
        
        // 1️⃣ Fetch로 HTML 가져오기
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${url}`);
        }

        let html = await response.text();

        // 2️⃣ HTML 정제 (위험한 스크립트 제거)
        html = sanitizeHTML(html);

        // 3️⃣ Shadow DOM 생성 (격리)
        if (!shadowRoot) {
          shadowRoot = browserContainer.attachShadow({ mode: 'open' });
          
          // 스타일 격리 (페이지 스타일 충돌 방지)
          const style = document.createElement('style');
          style.textContent = `
            :host {
              display: block;
              width: 100%;
              height: 100%;
              background: white;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            }
            * {
              box-sizing: border-box;
            }
            body {
              margin: 0;
              padding: 0;
              background: white;
              color: #333;
            }
            a {
              color: #0066cc;
            }
            a:visited {
              color: #551a8b;
            }
          `;
          shadowRoot.appendChild(style);
        }

        // 4️⃣ HTML 삽입
        shadowRoot.innerHTML = html;

        // 5️⃣ 외부 리소스 로드 (CSS, JS)
        loadExternalResources(url, shadowRoot);

        // 6️⃣ 링크 인터셉트 (브라우저 내에서 열기)
        interceptLinks(shadowRoot);

        // UI 업데이트
        mainContent.style.display = 'none';
        browserContainer.classList.add('show');
        pageLoader.classList.remove('active');

      } catch (error) {
        console.error('페이지 로드 실패:', error);
        pageLoader.classList.remove('active');
        
        // 에러 메시지 표시
        if (shadowRoot) {
          const errorHTML = `
            <div style="padding: 40px; text-align: center; font-family: Arial, sans-serif;">
              <h1 style="color: #d00;">❌ 페이지 로드 실패</h1>
              <p style="color: #666; margin: 20px 0;">
                <strong>${url}</strong>
              </p>
              <p style="color: #999;">오류: ${error.message}</p>
              <p style="margin-top: 30px; font-size: 12px; color: #ccc;">
                CORS 정책이나 네트워크 문제일 수 있습니다.
              </p>
            </div>
          `;
          shadowRoot.innerHTML = errorHTML;
          mainContent.style.display = 'none';
          browserContainer.classList.add('show');
        }
      }
    }

    /**
     * HTML 정제 (악의적 코드 제거)
     */
    function sanitizeHTML(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // ❌ 위험한 태그 제거
      const dangerousTags = ['script', 'iframe', 'object', 'embed', 'applet'];
      dangerousTags.forEach(tag => {
        doc.querySelectorAll(tag).forEach(el => el.remove());
      });

      // ❌ 위험한 속성 제거
      doc.querySelectorAll('*').forEach(el => {
        ['onload', 'onerror', 'onclick', 'onmouseover'].forEach(attr => {
          el.removeAttribute(attr);
        });
      });

      return doc.documentElement.innerHTML;
    }

    /**
     * 외부 리소스 로드 (CSS)
     */
    function loadExternalResources(baseUrl, shadowRoot) {
      const links = shadowRoot.querySelectorAll('link[rel="stylesheet"]');
      links.forEach(link => {
        const href = link.getAttribute('href');
        const fullUrl = new URL(href, baseUrl).href;
        
        const newLink = document.createElement('link');
        newLink.rel = 'stylesheet';
        newLink.href = fullUrl;
        newLink.crossOrigin = 'anonymous';
        
        shadowRoot.appendChild(newLink);
      });
    }

    /**
     * 링크 인터셉트 (브라우저 내에서 열기)
     */
    function interceptLinks(shadowRoot) {
      shadowRoot.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const href = link.getAttribute('href');
          if (href && !href.startsWith('#')) {
            navigate(href);
          }
        });
      });
    }

    /**
     * 페이지 네비게이션
     */
    function navigate(url) {
      // URL 검증
      if (!url) return;

      // 상대 URL을 절대 URL로 변환
      try {
        const absoluteUrl = new URL(url, window.location.href).href;
        loadPageInShadowDOM(absoluteUrl);
      } catch (error) {
        console.error('URL 변환 실패:', url);
        alert('유효하지 않은 URL입니다.');
      }
    }

    /**
     * 홈으로 돌아가기
     */
    function goHome() {
      mainContent.style.display = 'flex';
      browserContainer.classList.remove('show');
      document.getElementById('search-input').value = '';
    }

    // ══════════════════════════════════════════
    // 이벤트 리스너
    // ══════════════════════════════════════════

    document.addEventListener('DOMContentLoaded', function () {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const searchBtn = document.getElementById('search-btn');
      const luckyBtn = document.getElementById('lucky-btn');
      const suggestions = document.getElementById('suggestions');

      // 검색 버튼 클릭
      searchBtn.addEventListener('click', () => {
        const query = input.value.trim();
        if (query) {
          const searchUrl = buildSearchUrl(query, false);
          navigate(searchUrl);
        }
      });

      // Lucky 버튼
      luckyBtn.addEventListener('click', () => {
        const query = input.value.trim();
        if (query) {
          const searchUrl = buildSearchUrl(query, true);
          navigate(searchUrl);
        }
      });

      // Enter 키 검색
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const query = input.value.trim();
          if (query) {
            const searchUrl = buildSearchUrl(query, false);
            navigate(searchUrl);
          }
        }
      });

      // 입력값 변화 감지
      input.addEventListener('input', (e) => {
        const query = e.target.value;
        if (query) {
          clearBtn.classList.remove('hidden');
        } else {
          clearBtn.classList.add('hidden');
        }
      });

      // 지우기 버튼
      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      // Google Lens 버튼 (임시)
      document.getElementById('lens-btn')?.addEventListener('click', () => {
        alert('Google Lens는 준비 중입니다.');
      });

      // 음성 버튼 (임시)
      document.getElementById('voice-btn')?.addEventListener('click', () => {
        alert('음성 검색은 준비 중입니다.');
      });
    });

    // 글로벌 navigate 함수 (빠른 링크용)
    window.navigate = navigate;
  </script>
</body>
</html>
