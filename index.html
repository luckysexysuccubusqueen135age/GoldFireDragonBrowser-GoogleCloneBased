  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #0a0010;
      background-image: url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* ── Search bar ── */
    .search-bar {
      border: 1px solid rgba(200,160,255,0.35);
      border-radius: 24px;
      background: rgba(12, 4, 28, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .search-bar:hover {
      box-shadow: 0 2px 18px rgba(168,85,247,0.4);
      border-color: rgba(245,158,11,0.55);
    }
    .search-bar:focus-within {
      box-shadow: 0 2px 24px rgba(168,85,247,0.55);
      border-color: rgba(245,158,11,0.8);
    }
    .search-bar input:focus { outline: none; }
    .search-bar input::placeholder { color: rgba(200,160,255,0.45); }

    /* ── Buttons ── */
    .g-btn {
      background: rgba(12, 4, 28, 0.6);
      border: 1px solid rgba(200,160,255,0.3);
      border-radius: 6px;
      color: #e9d5ff;
      font-size: 14px;
      padding: 0 18px;
      height: 36px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .g-btn:hover {
      border-color: rgba(245,158,11,0.75);
      box-shadow: 0 0 16px rgba(168,85,247,0.45);
      background: rgba(168,85,247,0.28);
      color: #fff;
    }
    .g-btn:focus { outline: 2px solid #a855f7; outline-offset: 1px; }

    /* ── Top nav links ── */
    .top-link {
      color: #e9d5ff;
      font-size: 13px;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.1s;
    }
    .top-link:hover { background-color: rgba(255,255,255,0.1); }

    /* ── Footer links ── */
    .foot-link {
      color: rgba(196,160,255,0.75);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.1s;
    }
    .foot-link:hover { text-decoration: underline; color: #f59e0b; }

    /* ── Apps popup ── */
    .apps-popup {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: rgba(12, 4, 28, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 12px;
      box-shadow: 0 8px 36px rgba(168,85,247,0.4);
      padding: 16px 8px;
      width: 260px;
      z-index: 100;
    }
    .apps-popup.open { display: block; }
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s;
    }
    .app-item:hover { background: rgba(168,85,247,0.22); }
    .app-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
      font-size: 22px;
    }
    .app-label { font-size: 12px; color: #e9d5ff; text-align: center; }

    /* ── Icon buttons ── */
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: #c4b5fd;
      display: flex; align-items: center; justify-content: center;
      padding: 4px;
      border-radius: 50%;
      transition: background 0.1s, color 0.1s;
      width: 32px; height: 32px;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

    /* ── Suggestions dropdown ── */
    .suggestions-box {
      display: none;
      position: absolute;
      top: calc(100% - 1px);
      left: 0; right: 0;
      background: rgba(12, 4, 28, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(245,158,11,0.45);
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 8px 28px rgba(168,85,247,0.35);
      overflow: hidden;
      z-index: 50;
    }
    .suggestions-box.open { display: block; }
    .suggestion-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      cursor: pointer;
      gap: 14px;
      font-size: 14px;
      color: #e9d5ff;
    }
    .suggestion-item:hover { background: rgba(168,85,247,0.2); }
    .suggestion-item .si-icon { color: #c084fc; font-size: 14px; width: 18px; text-align: center; }
    .suggestion-item .si-q { flex: 1; }
    .suggestion-item .si-tab { color: #f59e0b; font-size: 12px; cursor: pointer; }
    .suggestion-divider { border-top: 1px solid rgba(168,85,247,0.2); margin: 4px 0; }
    .suggestions-footer {
      text-align: center;
      font-size: 12px;
      color: #a78bfa;
      padding: 10px 0 12px;
      cursor: default;
    }

    /* ── Active search bar ── */
    .search-wrap.active .search-bar {
      border-radius: 24px 24px 0 0;
      box-shadow: 0 2px 24px rgba(168,85,247,0.55);
      border-color: rgba(245,158,11,0.8);
    }
    .search-wrap.active .suggestions-box { display: block; }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      const trendingSuggestions = [
        { icon: 'fa-fire', label: '인기 검색어', q: '오늘 날씨' },
        { icon: 'fa-clock', label: '', q: 'Google 번역' },
        { icon: 'fa-clock', label: '', q: 'YouTube' },
        { icon: 'fa-clock', label: '', q: 'Gmail' },
        { icon: 'fa-clock', label: '', q: 'Google 지도' },
      ];

      const input       = document.getElementById('search-input');
      const clearBtn    = document.getElementById('clear-btn');
      const searchWrap  = document.getElementById('search-wrap');
      const suggestBox  = document.getElementById('suggestions-box');
      const suggestList = document.getElementById('suggestions-list');
      const searchBtn   = document.getElementById('search-btn');
      const luckyBtn    = document.getElementById('lucky-btn');
      const appsBtn     = document.getElementById('apps-btn');
      const appsPopup   = document.getElementById('apps-popup');

      function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function renderSuggestions(query) {
        suggestList.innerHTML = '';
        let items;
        if (!query) {
          items = trendingSuggestions;
        } else {
          const base = [query, query + ' 뜻', query + ' 번역', query + ' 나무위키'];
          items = base.map(q => ({ icon: 'fa-magnifying-glass', label: '', q }));
        }
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.innerHTML = `
            <span class="si-icon"><i class="fa-solid ${item.icon}"></i></span>
            <span class="si-q">${escapeHtml(item.q)}</span>
            ${item.label ? `<span style="font-size:11px;color:#a78bfa;">${item.label}</span>` : ''}
            <span class="si-tab" title="검색창에 입력">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" style="vertical-align:middle;">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="#f59e0b"/>
              </svg>
            </span>
          `;
          div.addEventListener('mousedown', e => {
            e.preventDefault();
            input.value = item.q;
            closeSuggestions();
            doSearch();
          });
          div.querySelector('.si-tab').addEventListener('mousedown', e => {
            e.preventDefault();
            e.stopPropagation();
            input.value = item.q;
            input.focus();
            renderSuggestions(item.q);
          });
          suggestList.appendChild(div);
        });
      }

      function openSuggestions() {
        renderSuggestions(input.value);
        searchWrap.classList.add('active');
        suggestBox.classList.add('open');
      }

      function closeSuggestions() {
        searchWrap.classList.remove('active');
        suggestBox.classList.remove('open');
      }

      input.addEventListener('focus', () => openSuggestions());
      input.addEventListener('input', () => {
        const val = input.value;
        clearBtn.style.display = val ? 'flex' : 'none';
        renderSuggestions(val);
        if (!searchWrap.classList.contains('active')) openSuggestions();
      });

      document.addEventListener('mousedown', e => {
        if (!searchWrap.contains(e.target)) closeSuggestions();
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.style.display = 'none';
        input.focus();
        renderSuggestions('');
      });

      const SEARCH_BASE   = 'https://www.google.co.jp/search';
      const SEARCH_PARAMS = 'gl=jp&hl=ko&safe=off';

      function doSearch() {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&${SEARCH_PARAMS}`, '_blank');
      }

      searchBtn.addEventListener('click', doSearch);
      luckyBtn.addEventListener('click', () => {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&${SEARCH_PARAMS}`, '_blank');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { closeSuggestions(); doSearch(); }
        if (e.key === 'Escape') closeSuggestions();
      });

      appsBtn.addEventListener('click', e => {
        e.stopPropagation();
        appsPopup.classList.toggle('open');
      });
      document.addEventListener('click', e => {
        if (!document.getElementById('apps-wrapper').contains(e.target)) {
          appsPopup.classList.remove('open');
        }
      });
    });
  </script>


</body></html>
