<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoldFireDragon Browser</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      color: #e9d5ff;
      font-family: Arial, sans-serif;
    }

    .search-bar {
      border: 2px solid #f59e0b;
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.9);
      backdrop-filter: blur(20px);
    }
    .search-bar:focus-within { 
      border-color: #fbbf24; 
      box-shadow: 0 0 50px rgba(245,158,11,0.9); 
    }

    #toggle-main-btn {
      width: 56px; height: 56px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #f59e0b;
      border-radius: 50%;
      font-size: 30px;
      transition: all 0.3s;
      z-index: 300;
    }
    #toggle-main-btn:hover {
      background: #d97706;
      transform: scale(1.2);
    }
  </style>
</head>
<body class="flex flex-col">

  <!-- Status -->
  <div class="fixed top-4 right-4 bg-emerald-600 text-black px-5 py-2.5 rounded-full font-bold text-sm shadow-xl z-50 flex items-center gap-2">
    🇯🇵 Japan WiFi IP • FULL UNCENSORED
  </div>

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 z-50 bg-black/40 backdrop-blur-md">
    <a href="#" class="hover:text-white px-4 py-2">Gmail</a>
    <a href="#" class="hover:text-white px-4 py-2">이미지</a>
    <a href="#" class="hover:text-white px-4 py-2">뉴스</a>
    <a href="#" class="hover:text-white px-4 py-2">지도</a>

    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기" class="ml-4">👁️</button>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4">
    <div class="text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           style="width: clamp(160px, 28vw, 260px);" class="mx-auto mb-6" draggable="false">
      <div class="text-7xl font-black tracking-[6px] bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-300 bg-clip-text text-transparent">
        GoldFireDragon
      </div>
      <div class="text-red-500 text-2xl mt-6 font-bold">FULL UNCENSORED MODE</div>
    </div>

    <div class="w-full max-w-[760px] mt-16">
      <div class="search-bar flex items-center px-8 py-7">
        <i class="fa-solid fa-magnifying-glass text-4xl text-amber-400 mr-6"></i>
        <input id="search-input" type="text" 
               class="flex-1 bg-transparent outline-none text-2xl placeholder:text-amber-300"
               placeholder="검색어 또는 URL을 입력하세요" autocomplete="off">
        <button id="clear-btn" class="hidden text-4xl text-amber-300 hover:text-white mr-6">✕</button>
        <button class="text-4xl text-amber-400 hover:text-white mr-5"><i class="fa-solid fa-microphone"></i></button>
        <button class="text-4xl text-amber-400 hover:text-white"><i class="fa-solid fa-image"></i></button>
      </div>

      <div class="flex justify-center gap-6 mt-10">
        <button id="search-btn" class="px-14 py-5 bg-amber-600 hover:bg-amber-700 rounded-3xl text-xl font-medium transition">
          GoldFireDragon 검색
        </button>
        <button id="lucky-btn" class="px-14 py-5 bg-transparent border-2 border-amber-400 hover:bg-amber-400 hover:text-black rounded-3xl text-xl font-medium transition">
          I'm Feeling Lucky
        </button>
      </div>
    </div>
  </main>

  <script>
    const PROXY_URL = "https://goldfiredragon.deno.dev/proxy";  
    // ← 여기에 당신의 Deno Proxy 실제 주소 입력!

    function openSearch(query) {
      query = query.trim();
      if (!query) return;

      let target = query;
      if (!target.startsWith('http')) {
        target = target.includes('.') ? 'http://' + target : 
                 `http://www.google.co.jp/search?q=${encodeURIComponent(query)}&gl=jp&hl=ko&safe=off&nfpr=1&filter=0`;
      }

      window.open(`${PROXY_URL}?url=${encodeURIComponent(target)}`, '_blank');
    }

    document.getElementById('search-btn').addEventListener('click', () => openSearch(document.getElementById('search-input').value));
    document.getElementById('lucky-btn').addEventListener('click', () => openSearch(document.getElementById('search-input').value));

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') openSearch(e.target.value);
    });

    // Clear
    const input = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    input.addEventListener('input', () => clearBtn.classList.toggle('hidden', !input.value));
    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.classList.add('hidden');
      input.focus();
    });

    // Fullscreen 토글
    let hidden = false;
    document.getElementById('toggle-main-btn').addEventListener('click', () => {
      hidden = !hidden;
      document.getElementById('main-content').classList.toggle('hidden', hidden);
      document.getElementById('toggle-main-btn').innerHTML = hidden ? '🔄' : '👁️';
    });

    input.focus();
  </script>
</body>
</html>
