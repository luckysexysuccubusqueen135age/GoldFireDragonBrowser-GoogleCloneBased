  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      margin: 0; padding: 0; min-height: 100vh;
      color: #e9d5ff;
    }

    .search-bar {
      border: 1px solid rgba(192,132,252,0.6);
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .search-bar:focus-within {
      border-color: #c084fc;
      box-shadow: 0 0 30px rgba(192,132,252,0.7);
    }

    #toggle-main-btn {
      width: 52px; height: 52px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #c084fc;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #toggle-main-btn:hover {
      background: #a855f7;
      transform: scale(1.15);
    }

    #main-content.hidden { display: none !important; }

    .japan-wifi {
      position: fixed;
      top: 16px;
      right: 215px;
      background: linear-gradient(90deg, #22c55e, #86efac);
      color: #052e16;
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 900;
      z-index: 200;
      box-shadow: 0 0 25px #22c55e;
      pointer-events: none;
    }

    /* Responsive wifi badge */
    @media (max-width: 600px) {
      .japan-wifi { right: auto; left: 50%; transform: translateX(-50%); font-size: 11px; padding: 6px 14px; top: 8px; }
      header { padding-right: 16px !important; }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Japan WiFi Badge -->
  <div class="japan-wifi">🇯🇵 Japan WiFi IP Connected • Proxy Active</div>

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 gap-2 z-50 flex-wrap"
          style="background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);">

    <a href="#" class="hover:text-white px-2 py-1 text-sm text-purple-300 whitespace-nowrap">Gmail</a>
    <a href="#" class="hover:text-white px-2 py-1 text-sm text-purple-300 whitespace-nowrap">이미지</a>
    <a href="#" class="hover:text-white px-2 py-1 text-sm text-purple-300 whitespace-nowrap">뉴스</a>
    <a href="#" class="hover:text-white px-2 py-1 text-sm text-purple-300 whitespace-nowrap">지도</a>

    <button id="apps-btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 text-xl" title="앱">
      <i class="fa-solid fa-grip text-purple-300"></i>
    </button>

    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기">👁️</button>

    <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png"
         class="w-9 h-9 rounded-full cursor-pointer object-cover"
         alt="FireDragon 계정" title="FireDragon 계정" loading="lazy">
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4 py-10">

    <!-- Logo & Title -->
    <div class="mb-10 text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png"
           style="width: clamp(100px, 18vw, 180px);"
           class="mx-auto drop-shadow-lg" draggable="false"
           alt="FireDragon Logo">
      <div class="text-4xl md:text-5xl font-black tracking-widest mt-6 text-white drop-shadow-lg">
        FireDragon
      </div>
      <div class="text-purple-300 text-sm mt-2">빠르고 안전한 프리미엄 브라우저</div>
    </div>

    <!-- Search Bar -->
    <div class="w-full max-w-[680px]">
      <div class="search-bar flex items-center px-5 py-4">
        <i class="fa-solid fa-magnifying-glass text-xl text-purple-400 mr-4 flex-shrink-0"></i>
        <input id="search-input" type="text"
               class="flex-1 bg-transparent outline-none text-base md:text-lg placeholder:text-purple-300 text-purple-100 min-w-0"
               placeholder="검색어 또는 URL을 입력하세요"
               autocomplete="off">
        <button id="clear-btn" class="hidden text-xl text-purple-300 hover:text-white mr-3 flex-shrink-0" title="지우기">✕</button>
        <button class="text-xl text-purple-400 hover:text-white mr-3 flex-shrink-0" title="음성 검색">
          <i class="fa-solid fa-microphone"></i>
        </button>
        <button class="text-xl text-purple-400 hover:text-white flex-shrink-0" title="이미지 검색">
          <i class="fa-solid fa-image"></i>
        </button>
      </div>

      <!-- Buttons -->
      <div class="flex justify-center gap-4 mt-8 flex-wrap">
        <button id="search-btn"
                class="px-8 py-3 bg-purple-600 hover:bg-purple-700 active:scale-95 rounded-xl text-sm font-medium transition-all shadow-lg shadow-purple-900/40">
          FireDragon 검색
        </button>
        <button id="lucky-btn"
                class="px-8 py-3 bg-transparent border border-purple-400 hover:bg-purple-500/20 active:scale-95 rounded-xl text-sm font-medium transition-all">
          I'm Feeling Lucky
        </button>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="mt-12 flex gap-6 flex-wrap justify-center">
      <a href="https://mail.google.com" target="_blank"
         class="flex flex-col items-center gap-2 text-purple-300 hover:text-white transition group">
        <div class="w-12 h-12 rounded-2xl bg-white/10 group-hover:bg-purple-600/40 flex items-center justify-center transition">
          <i class="fa-solid fa-envelope text-xl"></i>
        </div>
        <span class="text-xs">Gmail</span>
      </a>
      <a href="https://maps.google.co.jp" target="_blank"
         class="flex flex-col items-center gap-2 text-purple-300 hover:text-white transition group">
        <div class="w-12 h-12 rounded-2xl bg-white/10 group-hover:bg-purple-600/40 flex items-center justify-center transition">
          <i class="fa-solid fa-map-location-dot text-xl"></i>
        </div>
        <span class="text-xs">지도</span>
      </a>
      <a href="https://news.google.com" target="_blank"
         class="flex flex-col items-center gap-2 text-purple-300 hover:text-white transition group">
        <div class="w-12 h-12 rounded-2xl bg-white/10 group-hover:bg-purple-600/40 flex items-center justify-center transition">
          <i class="fa-solid fa-newspaper text-xl"></i>
        </div>
        <span class="text-xs">뉴스</span>
      </a>
      <a href="https://www.youtube.com" target="_blank"
         class="flex flex-col items-center gap-2 text-purple-300 hover:text-white transition group">
        <div class="w-12 h-12 rounded-2xl bg-white/10 group-hover:bg-purple-600/40 flex items-center justify-center transition">
          <i class="fa-brands fa-youtube text-xl"></i>
        </div>
        <span class="text-xs">YouTube</span>
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="py-5 text-center text-xs text-purple-500 border-t border-purple-900/30"
          style="background: rgba(0,0,0,0.6);">
    <div class="flex justify-center gap-6 mb-2">
      <a href="#" class="hover:text-purple-300 transition">개인정보처리방침</a>
      <a href="#" class="hover:text-purple-300 transition">서비스 약관</a>
      <a href="#" class="hover:text-purple-300 transition">설정</a>
    </div>
    🇯🇵 일본 • FireDragon 135.0
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input     = document.getElementById('search-input');
      const clearBtn  = document.getElementById('clear-btn');
      const mainContent = document.getElementById('main-content');
      const toggleBtn = document.getElementById('toggle-main-btn');

      let isHidden = false;

      /* ── 로고 + 검색바 ON/OFF ── */
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
      });

      /* ── 검색 함수 ── */
      function openSearch(query, lucky = false) {
        query = query.trim();
        if (!query) { input.focus(); return; }

        // URL 직접 입력
        if (/^https?:\/\//i.test(query) || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(query)) {
          let url = /^https?:\/\//i.test(query) ? query : 'https://' + query;
          window.open(url, '_blank');
          return;
        }

        // Google 일본 서버
        const base   = 'https://www.google.co.jp/search';
        const params = `gl=jp&hl=ko&safe=off&nfpr=1&filter=0&pws=0`;
        const suffix = lucky ? '&btnI=1' : '';
        window.open(`${base}?q=${encodeURIComponent(query)}&${params}${suffix}`, '_blank');
      }

      document.getElementById('search-btn').addEventListener('click', () => openSearch(input.value));
      document.getElementById('lucky-btn').addEventListener('click', () => openSearch(input.value, true));

      input.addEventListener('keydown', e => { if (e.key === 'Enter') openSearch(input.value); });

      input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !input.value);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      input.focus();
    });
  </script>
  <script>window.onload=function(){var d=document.createElement("div");d.id="appLoadFinished";document.body.appendChild(d);};</script>
<script>window.onload=function(){var d=document.createElement("div");d.id="appLoadFinished";document.body.appendChild(d);};</script>
</body>

</html>
