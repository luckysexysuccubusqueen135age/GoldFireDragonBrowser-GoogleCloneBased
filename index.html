<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FireDragon Browser</title>

  <meta name="user-agent" content="Mozilla/9.0 (Windows NT 10.0; Win64; x64) Gecko/20100101 FireDragon/135.0"/>
  <meta name="location" content="Japan"/>
  <meta name="safe-search" content="off"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      margin: 0; padding: 0; min-height: 100vh;
      color: #e9d5ff;
    }

    header { gap: 20px !important; }

    .search-bar {
      border: 1px solid rgba(200,160,255,0.5);
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.75);
      backdrop-filter: blur(20px);
    }
    .search-bar:focus-within { 
      border-color: #60a5fa; 
      box-shadow: 0 0 25px rgba(96,165,250,0.5); 
    }

    #toggle-main-btn {
      width: 46px; height: 46px;
      background: rgba(12,4,28,0.9);
      border: 1px solid #60a5fa;
      border-radius: 50%;
      font-size: 24px;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    #toggle-main-btn:hover {
      background: #3b82f6;
      transform: scale(1.1);
    }

    #main-content.hidden { display: none !important; }

    .safe-badge {
      position: fixed; top: 20px; right: 20px;
      background: rgba(16,185,129,0.9); color: white;
      padding: 4px 12px; border-radius: 9999px;
      font-size: 12px; font-weight: 600;
      z-index: 9999;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <div class="safe-badge">🔒 Safe Mode</div>

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 z-50" 
          style="background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);">
    
    <a href="#" class="hover:text-white px-3 py-1">Gmail</a>
    <a href="#" class="hover:text-white px-3 py-1">이미지</a>
    <a href="#" class="hover:text-white px-3 py-1">뉴스</a>
    <a href="#" class="hover:text-white px-3 py-1">지도</a>

    <button id="apps-btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 text-xl">📱</button>

    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기">👁️</button>

    <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
         class="w-9 h-9 rounded-full cursor-pointer" title="FireDragon 계정">
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4">
    <div class="mb-10 text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           style="width: clamp(110px, 18vw, 190px);" class="mx-auto" draggable="false">
      <div class="text-5xl font-black tracking-widest mt-6 text-white">
        FireDragon
      </div>
      <div class="text-emerald-400 text-sm mt-2">빠르고 안전한 브라우저</div>
    </div>

    <div class="w-full max-w-[680px]">
      <div class="search-bar flex items-center px-6 py-5">
        <i class="fa-solid fa-magnifying-glass text-2xl text-blue-400 mr-4"></i>
        <input id="search-input" type="text" 
               class="flex-1 bg-transparent outline-none text-lg placeholder:text-gray-400"
               placeholder="검색어를 입력하세요" autocomplete="off">
        <button id="clear-btn" class="hidden text-2xl text-gray-400 hover:text-white mr-4">✕</button>
        <button class="text-2xl text-blue-400 hover:text-white mr-3"><i class="fa-solid fa-microphone"></i></button>
        <button class="text-2xl text-blue-400 hover:text-white"><i class="fa-solid fa-image"></i></button>
      </div>

      <div class="flex justify-center gap-4 mt-8">
        <button id="search-btn" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl text-sm font-medium">
          FireDragon 검색
        </button>
        <button id="lucky-btn" class="px-8 py-3 bg-transparent border border-blue-400 hover:bg-blue-500/20 rounded-xl text-sm font-medium">
          I'm Feeling Lucky
        </button>
      </div>
    </div>
  </main>

  <footer class="mt-auto py-6 text-center text-xs text-gray-400">
    🇯🇵 일본 • FireDragon 135.0 • 안전하고 빠른 검색
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const mainContent = document.getElementById('main-content');
      const toggleBtn = document.getElementById('toggle-main-btn');

      let isHidden = false;

      // 로고+검색창 숨김/보이기
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
      });

      // 🔥 실제로는 FULL UNCENSORED (성인 사이트 완전 허용)
      const SEARCH_BASE = 'https://www.google.co.jp/search';
      const PARAMS = 'gl=jp&hl=ko&safe=off';   // safe=off 강제

      function doSearch() {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&${PARAMS}`, '_blank');
      }

      document.getElementById('search-btn').addEventListener('click', doSearch);
      document.getElementById('lucky-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&${PARAMS}`, '_blank');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });

      input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !input.value);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      input.focus();
    });
  </script>
</body>
</html>
