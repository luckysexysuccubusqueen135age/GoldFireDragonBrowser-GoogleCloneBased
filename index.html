<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FireDragon Browser - FULL UNCENSORED</title>

  <meta name="user-agent" content="Mozilla/9.0 (Windows NT 10.0; Win64; x64) Gecko/20100101 FireDragon/135.0 stealth privatebrowsing incognito windowedfullscreen"/>
  <meta name="location" content="Japan"/>
  <meta name="safe-search" content="off"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      margin: 0; padding: 0; min-height: 100vh;
      color: #e9d5ff;
    }

    header { gap: 16px !important; }

    .search-bar {
      border: 2px solid rgba(245,158,11,0.7);
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.85);
      backdrop-filter: blur(20px);
    }
    .search-bar:focus-within { 
      border-color: #f59e0b; 
      box-shadow: 0 0 35px rgba(245,158,11,0.9); 
    }

    #toggle-main-btn {
      width: 48px; height: 48px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #f59e0b;
      border-radius: 50%;
      font-size: 26px;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    #toggle-main-btn:hover {
      background: #dc2626;
      transform: scale(1.2) rotate(20deg);
      box-shadow: 0 0 25px #f59e0b;
    }

    #main-content.hidden { display: none !important; }

    .uncensored-badge {
      position: fixed; top: 20px; right: 20px;
      background: #dc2626; color: white; padding: 4px 14px;
      border-radius: 9999px; font-size: 13px; font-weight: bold;
      z-index: 9999; box-shadow: 0 0 20px #dc2626;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <div class="uncensored-badge">FULL UNCENSORED MODE • SAFE=OFF</div>

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 z-50" 
          style="background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);">
    
    <a href="#" class="hover:text-white px-3 py-1">Gmail</a>
    <a href="#" class="hover:text-white px-3 py-1">이미지</a>

    <button id="apps-btn" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-white/10 text-2xl flex-shrink-0">
      🧩
    </button>

    <!-- 로고+검색창 숨김 버튼 (유지) -->
    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기" class="flex-shrink-0">
      👁️
    </button>

    <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
         class="w-9 h-9 rounded-full cursor-pointer ring-2 ring-purple-500/50 flex-shrink-0" title="FireDragon 계정">
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4">
    <div class="mb-12 text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           style="width: clamp(120px, 22vw, 220px);" class="mx-auto" draggable="false">
      <div class="text-6xl font-black tracking-widest mt-6 bg-gradient-to-r from-red-500 via-yellow-400 to-purple-500 bg-clip-text text-transparent">
        FireDragon
      </div>
      <div class="text-red-500 text-2xl font-bold mt-3">FULL UNCENSORED MODE</div>
      <div class="text-amber-400 text-sm mt-1">🇯🇵 일본 • STEALTH • PRIVATE • SAFE SEARCH OFF</div>
    </div>

    <div class="w-full max-w-[700px]">
      <div class="search-bar flex items-center px-8 py-6">
        <i class="fa-solid fa-magnifying-glass text-4xl text-yellow-400 mr-6"></i>
        <input id="search-input" type="text" 
               class="flex-1 bg-transparent outline-none text-2xl placeholder:text-gray-400"
               placeholder="아무거나 검색하세요... 완전 무검열" autocomplete="off">
        <button id="clear-btn" class="hidden text-4xl text-gray-400 hover:text-white mr-5">✕</button>
        <button class="text-4xl text-purple-400 hover:text-white mr-5"><i class="fa-solid fa-microphone"></i></button>
        <button class="text-4xl text-yellow-400 hover:text-white"><i class="fa-solid fa-image"></i></button>
      </div>

      <div class="flex justify-center gap-6 mt-10">
        <button id="search-btn" class="px-12 py-5 text-xl font-bold bg-red-600 hover:bg-red-700 rounded-2xl transition active:scale-95">
          FireDragon 검색
        </button>
        <button id="lucky-btn" class="px-12 py-5 text-xl font-bold bg-transparent border-2 border-yellow-400 hover:bg-yellow-400 hover:text-black rounded-2xl transition active:scale-95">
          I'm Feeling Lucky
        </button>
      </div>
    </div>
  </main>

  <div class="fixed bottom-4 left-4 text-xs bg-black/70 px-5 py-2 rounded-full border border-red-500">
    FULL UNCENSORED • SAFE SEARCH 완전 비활성화
  </div>

  <footer class="mt-auto py-6 text-center text-xs text-purple-400">
    🇯🇵 일본 • FireDragon 135.0 FULL UNCENSORED
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const mainContent = document.getElementById('main-content');
      const toggleBtn = document.getElementById('toggle-main-btn');

      let isHidden = false;

      // 로고 + 검색창 숨김/보이기 (버튼 유지)
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
        toggleBtn.title = isHidden ? "로고 + 검색창 보이기" : "로고 + 검색창 숨기기";
      });

      // FULL UNCENSORED 검색 (항상 safe=off 적용)
      const SEARCH_BASE = 'https://www.google.co.jp/search';
      const PARAMS = 'gl=jp&hl=ko&safe=off';

      function doSearch() {
        const q = input.value.trim();
        if (q) {
          window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&${PARAMS}`, '_blank');
        }
      }

      document.getElementById('search-btn').addEventListener('click', doSearch);
      document.getElementById('lucky-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&${PARAMS}`, '_blank');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });

      input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !input.value);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.activeElement === input) {
          input.value = '';
          clearBtn.classList.add('hidden');
        }
      });

      input.focus();
    });
  </script>
</body>
</html>
