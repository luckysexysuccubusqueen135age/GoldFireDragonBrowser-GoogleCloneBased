<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GoldFireDragon Browser</title>
    <!-- Tailwind CSS 인프라 및 전용 고풍스러운 Cinzel 폰트 임베드 -->
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* 골드 파이어드래곤 브라우저 통합 마스터 테마 시트 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a0010 url('images/GoldFireDragonBrowser_home_page.jpg') center / cover no-repeat fixed;
            overflow-x: hidden;
        }

        .gold-title {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #ffe066 0%, #f59e0b 50%, #b45309 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .gold-border {
            border-image: linear-gradient(to right, #f59e0b, #78350f) 1;
        }

        /* 크롬 형태 커스텀 골드 스크롤바 메커니즘 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(10, 0, 16, 0.8); }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #d97706; }
    </style>
</head>
<body class="text-purple-100 min-h-screen flex flex-col justify-between p-4 bg-space">

    <!-- 1. TOP HEADER NAVIGATION BAR -->
    <header class="flex flex-wrap justify-between items-center gap-4 bg-purple-950/40 backdrop-blur-md border border-purple-500/20 rounded-2xl p-4 shadow-2xl">
        <!-- 기존 헤더 왼쪽 디자인 정렬 유지 (간섭 에러 원천 차단) -->
        <div class="flex items-center gap-4 text-xs font-semibold text-purple-200">
            <div class="japan-wifi">🇯🇵 Japan WiFi IP Connected • Proxy Active</div>
        </div>

        <!-- RIGHT BAR NAVIGATION MENU -->
        <div class="flex items-center gap-3">
            <button class="bg-purple-900/40 hover:bg-purple-800/60 border border-purple-500/30 rounded-xl px-4 py-2 text-xs transition duration-200 font-medium tracking-wide">Proxy Settings</button>
            <button class="bg-purple-900/40 hover:bg-purple-800/60 border border-purple-500/30 rounded-xl px-4 py-2 text-xs transition duration-200 font-medium tracking-wide">Bookmarks</button>
        </div>
    </header>

    <!-- 2. MAIN BROWSER CONTENT ENGINE -->
    <main class="flex-1 flex flex-col items-center justify-center my-8">
        <!-- 메인 골드 로고 엠블럼 명세 -->
        <div class="text-center mb-8">
            <h1 class="gold-title text-4xl md:text-6xl font-black tracking-widest mb-2">GOLD FIRE DRAGON</h1>
            <p class="text-purple-400 text-xs tracking-[0.3em] uppercase font-light">Google Clone Browser System Base</p>
        </div>

        <!-- 구글 검색바 인터페이스 + CroxyProxy 프록시 네트워크 주소창 -->
        <div class="w-full max-w-2xl bg-purple-950/30 border border-purple-500/20 rounded-3xl p-6 shadow-2xl backdrop-blur-sm">
            <div class="flex items-center gap-3 bg-black/40 rounded-2xl px-4 py-3 border border-purple-500/30 focus-within:border-amber-500 transition duration-300">
                <span class="text-purple-400 text-lg">🔍</span>
                <input type="text" id="browser-search-input" placeholder="Google 검색 또는 웹 주소 입력 (CroxyProxy 우회 연동)" class="w-full bg-transparent text-sm text-purple-100 outline-none placeholder-purple-400/50">
            </div>
            
            <!-- 하단 퀵 메뉴 앵커 링크 -->
            <div class="flex flex-wrap justify-center gap-4 mt-6 text-xs text-purple-300">
                <a href="https://google.com" target="_blank" class="hover:text-amber-400 transition">Google</a>
                <span class="text-purple-700">•</span>
                <a href="https://github.com" target="_blank" class="hover:text-amber-400 transition">GitHub Profile</a>
                <span class="text-purple-700">•</span>
                <a href="https://supabase.com" target="_blank" class="hover:text-amber-400 transition">Supabase Console</a>
            </div>
        </div>
    </main>

    <!-- 3. FOOTER INFO INTERFACE -->
    <footer class="text-center text-[10px] text-purple-400/40 tracking-wider py-4 border-t border-purple-500/10">
        &copy; 2026 GoldFireDragon Browser • Packaged with Cordova & Webpack Compiler Assets
    </footer>


    <!-- ──────────────────────────────────────────────────────────── -->
    <!-- 🔥 [따로 추가한 독립형 우측 하단 플로팅 VPN 제어 버튼 위젯] -->
    <!-- 기존 레이아웃 코드들의 지배를 받지 않고 무조건 Z-Index 최상위단으로 강제 팝업 노출됩니다. -->
    <div id="vpn-floating-widget" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; align-items: center; gap: 12px; background: rgba(12, 4, 24, 0.95); border: 2px solid #10b981; border-radius: 16px; padding: 12px 18px; box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); backdrop-filter: blur(10px); font-family: sans-serif;">
        
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <span style="color: #e9d5ff; font-size: 11px; font-weight: bold; letter-spacing: 0.5px;">🇯🇵 JAPAN PROXY VPN</span>
            <!-- 일본 Config 파일 저장소 풀 연동 드롭다운 -->
            <select id="vpn-server-selector" style="background: #1e1b4b; color: #f3e8ff; font-size: 11px; border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 6px; padding: 4px 8px; outline: none; cursor: pointer; font-weight: bold;">
                <option value="IPS_219.100.37.105_tcp_443.ovpn">일본 서버 #1 (105 TCP)</option>
                <option value="FOV_Japan_219.100.37.170_tcp.ovpn">일본 서버 #2 (170 TCP)</option>
            </select>
        </div>

        <!-- ⚡ 최종 마스터 작동 클릭 버튼 컴포넌트 -->
        <button id="vpn-master-btn" style="background: #059669; color: #ffffff; font-weight: 900; font-size: 11px; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s ease;">
            연결됨
        </button>
    </div>
    <!-- ──────────────────────────────────────────────────────────── -->


    <!-- ⚠️ [핵심 빌드 결합 장치]: Cordova 런타임 주입 및 웹팩 컴파일 스크립트 연결 -->
    <script src="cordova.js"></script>
    <script src="bundle.js"></script>
</body>
</html>
