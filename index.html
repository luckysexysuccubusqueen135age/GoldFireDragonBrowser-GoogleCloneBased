  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0010
        url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg')

      color: #e9d5ff;
    }

    /* ── Search bar ── */
    .search-bar {
      border: 1px solid rgba(192,132,252,0.6);
      border-radius: 9999px;
      background: rgba(12,4,28,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .search-bar:focus-within {
      border-color: #c084fc;
      box-shadow: 0 0 30px rgba(192,132,252,0.7);
    }

    /* ── Suggestions dropdown ── */
    #suggestions {
      background: rgba(12,4,28,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(192,132,252,0.4);
      border-top: none;
      border-radius: 0 0 1.5rem 1.5rem;
      overflow: hidden;
    }
    #suggestions li {
      padding: 10px 20px;
      cursor: pointer;
      color: #d8b4fe;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
    }
    #suggestions li:hover { background: rgba(192,132,252,0.15); }

    /* ── Toggle button ── */
    #toggle-main-btn {
      width: 44px; height: 44px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #c084fc;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #toggle-main-btn:hover {
      background: #a855f7;
      transform: scale(1.12);
    }

    /* ── Hidden state ── */
    #main-content.is-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #main-content {
      transition: opacity 0.25s;
    }

    /* ── Japan WiFi badge ── */
    .japan-wifi {
      background: linear-gradient(90deg,#22c55e,#86efac);
      color: #052e16;
      padding: 4px 14px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 0 16px #22c55e88;
      pointer-events: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Apps popup ── */
    #apps-popup {
      display: none;
      position: fixed;
      top: 60px;
      right: 16px;
      background: rgba(12,4,28,0.97);
      border: 1px solid rgba(192,132,252,0.4);
      border-radius: 16px;
      padding: 16px;
      z-index: 600;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 280px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #apps-popup.open { display: block; }
    .app-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .app-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px;
      border-radius: 12px;
      color: #d8b4fe;
      font-size: 11px;
      text-decoration: none;
      transition: background 0.15s;

    .app-item:hover { background: rgba(192,132,252,0.2); color: #fff; }
    .app-item i { font-size: 22px; }

    /* ── Voice modal ── */
    #voice-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 900;
      align-items: center;
      justify-content: center;

    #voice-modal.open { display: flex; }
    .voice-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(192,132,252,0.15);

      display: flex; align-items: center; justify-content: center;

      box-shadow: 0 0 40px rgba(192,132,252,0.8);
    }
    @keyframes pulse-ring {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.1); }
    }

    /* ── Privacy Mode Overlay ── */
    #privacy-overlay {

      inset: 0;
      z-index: 5;
      pointer-events: none;
      align-items: center;
      justify-content: center;

      color: rgba(167,139,250,0.12);

      user-select: none;
    }
    .privacy-label {

      font-weight: 900;
      letter-spacing: 0.25em;
      color: rgba(167,139,250,0.28);
      text-transform: uppercase;
      user-select: none;
    }
    @keyframes shield-pulse {
      0%,100% { transform: scale(1);   opacity: 0.7; }
      50%      { transform: scale(1.06); opacity: 1;   }
    }

    /* ── Privacy Mode Toggle Button ── */
    .privacy-mode-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 800;

      color: #ede9fe;

      transition: background 0.28s, box-shadow 0.28s;
      flex-shrink: 0;
    }
    .privacy-mode-btn.on .pm-dot {

      box-shadow: 0 0 8px #a78bfa;

  <script>
    // InvisiProxy Configuration
    const PROXY_CONFIG = {
      enabled: false,
      proxyUrl: '/proxy',
      proxyApiUrl: '/api/proxy',
      supportedModes: ['ultraviolet', 'rammerhead', 'bare', 'scramjet']
    };

    document.addEventListener('DOMContentLoaded', function () {

      /* ── DOM refs ── */
      var input       = document.getElementById('search-input');
      var clearBtn    = document.getElementById('clear-btn');
      var searchBtn   = document.getElementById('search-btn');
      var luckyBtn    = document.getElementById('lucky-btn');
      var toggleBtn   = document.getElementById('toggle-main-btn');
      var mainContent = document.getElementById('main-content');
      var appsBtn     = document.getElementById('apps-btn');
      var appsPopup   = document.getElementById('apps-popup');
      var suggestions = document.getElementById('suggestions');
      var proxyToggle      = document.getElementById('proxy-mode-toggle');
      var privacyModeBtn   = document.getElementById('privacy-mode-btn');
      var privacyOverlay   = document.getElementById('privacy-overlay');
      var pmLabel          = document.getElementById('pm-label');
      var privacyModeOn    = false;

      var isHidden = false;

      /* ── 프라이버시 모드 토글 ── */
      privacyModeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        privacyModeOn = !privacyModeOn;
        privacyModeBtn.classList.toggle('on', privacyModeOn);
        privacyOverlay.classList.toggle('active', privacyModeOn);
        pmLabel.textContent = privacyModeOn ? '프라이버시 ON' : '프라이버시 모드';
      });

      /* ── 프록시 모드 토글 ── */
      proxyToggle.addEventListener('click', function (e) {
        e.stopPropagation();
        PROXY_CONFIG.enabled = !PROXY_CONFIG.enabled;
        updateProxyToggleUI();
        console.log('Proxy Mode:', PROXY_CONFIG.enabled ? '활성화됨' : '비활성화됨');
      });

      function updateProxyToggleUI() {
        if (PROXY_CONFIG.enabled) {
          proxyToggle.innerHTML = '🔓 프록시 모드 비활성화';
          proxyToggle.style.background = 'linear-gradient(90deg,#dc2626,#ef4444)';
          proxyToggle.style.color = '#fef2f2';
        } else {
          proxyToggle.innerHTML = '🔐 프록시 모드 활성화';
          proxyToggle.style.background = 'linear-gradient(90deg,#f59e0b,#fbbf24)';
          proxyToggle.style.color = '#78350f';
        }
      }

      /* ── 로고 + 검색바 ON/OFF ── */
      toggleBtn.addEventListener('click', function () {
        isHidden = !isHidden;
        mainContent.classList.toggle('is-hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
      });

      /* ── Apps popup ── */
      appsBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        appsPopup.classList.toggle('open');
      });
      document.addEventListener('click', function () {
        appsPopup.classList.remove('open');
      });
      appsPopup.addEventListener('click', function (e) { e.stopPropagation(); });

      var voiceModal    = document.getElementById('voice-modal');
      var voiceStartBtn = document.getElementById('voice-start-btn');
      var voiceCloseBtn = document.getElementById('voice-close-btn');
      var voiceStatus   = document.getElementById('voice-status');
      var voiceInterim  = document.getElementById('voice-interim');
      var voiceBtn      = document.getElementById('voice-btn');
      var lensBtn       = document.getElementById('lens-btn');

      /* ── 프록시를 통한 URL 변환 ── */
      function proxyifyUrl(url) {
        if (!PROXY_CONFIG.enabled) return url;
        // InvisiProxy 형식으로 URL 인코딩
        // 예: /service/ultraviolet?url=encoded_url
        return PROXY_CONFIG.proxyUrl + '?url=' + encodeURIComponent(url);
      }

      /* ── 검색 실행 ── */
      function openSearch(query, lucky) {
        query = (query || '').trim();
        if (!query) { input.focus(); return; }

        var isURL = /^https?:\/\//i.test(query) ||
                    /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(query);
        if (isURL) {
          var url = /^https?:\/\//i.test(query) ? query : 'https://' + query;
          url = proxyifyUrl(url);
          window.open(url, '_blank');
          return;
        }

        var base      = 'https://www.google.co.jp/search';
        var safeParam = privacyModeOn ? 'safe=off' : 'safe=active';
        var params    = 'gl=jp&hl=ko&' + safeParam + '&nfpr=1&filter=0&pws=0';
        var suffix    = lucky ? '&btnI=1' : '';
        var searchUrl = base + '?q=' + encodeURIComponent(query) + '&' + params + suffix;
        searchUrl = proxyifyUrl(searchUrl);
        window.open(searchUrl, '_blank');
      }

      searchBtn.addEventListener('click', function () { openSearch(input.value, false); });
      luckyBtn.addEventListener('click',  function () { openSearch(input.value, true);  });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { openSearch(input.value, false); hideSuggestions(); }
        if (e.key === 'Escape') { hideSuggestions(); }
      });

      /* ── Google Lens (이미지 검색) ── */
      lensBtn.addEventListener('click', function () {
        var lensUrl = 'https://lens.google.com';
        lensUrl = proxyifyUrl(lensUrl);
        window.open(lensUrl, '_blank');
      });

      /* ── 음성 검색 (Web Speech API) ── */
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      var recognition = null;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = function () {
          voiceStatus.textContent = '듣고 있습니다…';
          voiceStartBtn.classList.add('listening');
        };
        recognition.onresult = function (e) {
          var transcript = '';
          for (var i = e.resultIndex; i < e.results.length; i++) {
            transcript += e.results[i][0].transcript;
          }
          voiceInterim.textContent = transcript;
          if (e.results[e.results.length - 1].isFinal) {
            input.value = transcript;
            clearBtn.classList.remove('hidden');
            closeVoiceModal();
            openSearch(transcript, false);
          }
        };
        recognition.onerror = function (e) {
          voiceStatus.textContent = '오류: ' + (e.error === 'not-allowed' ? '마이크 권한을 허용해주세요' : e.error);
          voiceStartBtn.classList.remove('listening');
        };
        recognition.onend = function () {
          voiceStartBtn.classList.remove('listening');
          if (voiceModal.classList.contains('open')) {
            voiceStatus.textContent = '다시 누르면 재시도합니다';
          }
        };
      } else {
        voiceBtn.title = '이 브라우저는 음성 인식을 지원하지 않습니다';
        voiceBtn.style.opacity = '0.4';
        voiceBtn.style.cursor  = 'not-allowed';
      }

      voiceBtn.addEventListener('click', function () {
        if (!recognition) return;
        openVoiceModal();
      });

      voiceStartBtn.addEventListener('click', function () {
        if (!recognition) return;
        voiceInterim.textContent = '';
        voiceStatus.textContent  = '듣고 있습니다…';
        try { recognition.start(); } catch(e) {/* 이미 실행 중 */}
      });

      voiceCloseBtn.addEventListener('click', closeVoiceModal);
      voiceModal.addEventListener('click', function (e) {
        if (e.target === voiceModal) closeVoiceModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && voiceModal.classList.contains('open')) closeVoiceModal();
      });

      function openVoiceModal() {
        voiceInterim.textContent = '';
        voiceStatus.textContent  = '마이크 버튼을 누르세요';
        voiceModal.classList.add('open');
      }
      function closeVoiceModal() {
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        voiceModal.classList.remove('open');
        voiceStartBtn.classList.remove('listening');
      }

      /* ── Clear button ── */
      input.addEventListener('input', function () {
        clearBtn.classList.toggle('hidden', !input.value);
        if (input.value.length >= 2) {
          fetchSuggestions(input.value);
        } else {
          hideSuggestions();
        }
      });
      clearBtn.addEventListener('click', function () {
        input.value = '';
        clearBtn.classList.add('hidden');
        hideSuggestions();
        input.focus();
      });

      /* ── Autocomplete suggestions (JSONP) ── */
      var suggestTimer  = null;
      var suggestSerial = 0;

      function fetchSuggestions(query) {
        clearTimeout(suggestTimer);
        suggestTimer = setTimeout(function () {
          var serial    = ++suggestSerial;
          var cbName    = '__fdSuggest_' + serial;
          var scriptEl  = document.createElement('script');
          scriptEl.id   = 'suggest-script-' + serial;

          window[cbName] = function (data) {
            var el = document.getElementById('suggest-script-' + serial);
            if (el) el.remove();
            delete window[cbName];
            if (serial !== suggestSerial) return;
            renderSuggestions(Array.isArray(data[1]) ? data[1] : []);
          };

          scriptEl.onerror = function () {
            var el = document.getElementById('suggest-script-' + serial);
            if (el) el.remove();
            delete window[cbName];
          };

          scriptEl.src =
            'https://suggestqueries.google.com/complete/search?client=chrome&q=' +
            encodeURIComponent(query) + '&callback=' + cbName;

          document.body.appendChild(scriptEl);
        }, 220);
      }

      function renderSuggestions(items) {
        if (!items.length) { hideSuggestions(); return; }
        suggestions.innerHTML = '';
        items.slice(0, 6).forEach(function (text) {
          var li = document.createElement('li');
          li.setAttribute('role', 'option');
          li.innerHTML = '<i class="fa-solid fa-magnifying-glass text-purple-500"></i><span>' +
                         escapeHTML(text) + '</span>';
          li.addEventListener('mousedown', function (e) {
            e.preventDefault();
            input.value = text;
            clearBtn.classList.remove('hidden');
            hideSuggestions();
            openSearch(text, false);
          });
          suggestions.appendChild(li);
        });
        suggestions.classList.remove('hidden');
      }

      function hideSuggestions() {
        suggestions.classList.add('hidden');
        suggestions.innerHTML = '';
      }

      function escapeHTML(str) {
        return str.replace(/&/g,'&amp;')
                  .replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;');
      }

      document.addEventListener('click', function (e) {
        if (!input.contains(e.target) && !suggestions.contains(e.target)) {
          hideSuggestions();
        }
      });

      /* ── Auto focus ── */
      input.focus();
    });
  </script>
  <!-- App load signal for OnSpace preview -->
  <script>
    window.onload = function () {
      var d = document.createElement('div');
      d.id = 'appLoadFinished';
      document.body.appendChild(d);
    };
  </script>
<script>window.onload=function(){var d=document.createElement("div");d.id="appLoadFinished";document.body.appendChild(d);};</script>
