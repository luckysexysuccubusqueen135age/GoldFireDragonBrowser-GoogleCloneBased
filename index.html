<html lang="ko">
<head>
  <meta charset="UTF-8"/>

<script async src="https://cse.google.com/cse.js?cx=454b6392f713a4c30">
</script>
<div class="gcse-searchresults-only"></div>

  <meta name="user-agent" content="Mozilla/9.0 (Windows NT 10.0; Win64; x64) Gecko/20100101 FireDragon/135.0"/>
  <meta name="location" content="Japan"/>
  <meta name="safe-search" content="off"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      margin: 0; padding: 0; min-height: 100vh;
      color: #e9d5ff;
    }

    header { gap: 24px !important; padding-right: 40px; }

    .search-bar {
      border: 1px solid rgba(192,132,252,0.6);
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.82);
      backdrop-filter: blur(20px);
    }
    .search-bar:focus-within { 
      border-color: #c084fc; 
      box-shadow: 0 0 30px rgba(192,132,252,0.7); 
    }

    #toggle-main-btn {
      width: 52px; height: 52px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #c084fc;
      border-radius: 50%;
      font-size: 28px;
      transition: all 0.3s;
      flex-shrink: 0;
      z-index: 300;
    }
    #toggle-main-btn:hover {
      background: #a855f7;
      transform: scale(1.15);
    }

    #main-content.hidden { display: none !important; }

    .japan-wifi {
      position: fixed; 
      top: 16px; 
      right: 215px;
      background: linear-gradient(90deg, #22c55e, #86efac);
      color: #052e16;
      padding: 8px 20px; 
      border-radius: 9999px;
      font-size: 14px; 
      font-weight: 900;
      z-index: 200;
      box-shadow: 0 0 25px #22c55e;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <div class="japan-wifi">🇯🇵 Japan WiFi IP Connected • Proxy Active</div>

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 z-50" 
          style="background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);">
    
    <a href="#" class="hover:text-white px-3 py-1">Gmail</a>
    <a href="#" class="hover:text-white px-3 py-1">이미지</a>
    <a href="#" class="hover:text-white px-3 py-1">뉴스</a>
    <a href="#" class="hover:text-white px-3 py-1">지도</a>

    <button id="apps-btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 text-xl">📱</button>

    <!-- 로고+검색바 ON/OFF 버튼 (절대 안 가림) -->
    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기">👁️</button>

    <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
         class="w-9 h-9 rounded-full cursor-pointer" title="FireDragon 계정">
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4">
    <div class="mb-10 text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           style="width: clamp(120px, 20vw, 200px);" class="mx-auto" draggable="false">
      <div class="text-5xl font-black tracking-widest mt-6 text-white">
        FireDragon
      </div>
      <div class="text-purple-300 text-sm mt-2">빠르고 안전한 프리미엄 브라우저</div>
    </div>

    <div class="w-full max-w-[680px]">
      <div class="search-bar flex items-center px-6 py-5">
        <i class="fa-solid fa-magnifying-glass text-2xl text-purple-400 mr-4"></i>
        <input id="search-input" type="text" 
               class="flex-1 bg-transparent outline-none text-lg placeholder:text-purple-300"
               placeholder="검색어 또는 URL을 입력하세요" autocomplete="off">
        <button id="clear-btn" class="hidden text-2xl text-purple-300 hover:text-white mr-4">✕</button>
        <button class="text-2xl text-purple-400 hover:text-white mr-3"><i class="fa-solid fa-microphone"></i></button>
        <button class="text-2xl text-purple-400 hover:text-white"><i class="fa-solid fa-image"></i></button>
      </div>

      <div class="flex justify-center gap-4 mt-8">
        <button id="search-btn" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 rounded-xl text-sm font-medium transition">
          FireDragon 검색
        </button>
        <button id="lucky-btn" class="px-8 py-3 bg-transparent border border-purple-400 hover:bg-purple-500/20 rounded-xl text-sm font-medium transition">
          I'm Feeling Lucky
        </button>
      </div>
    </div>
  </main>

  <footer class="mt-auto py-6 text-center text-xs text-purple-400">
    🇯🇵 일본 • FireDragon 135.0
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const mainContent = document.getElementById('main-content');
      const toggleBtn = document.getElementById('toggle-main-btn');

      let isHidden = false;

      // 로고 + 검색바 ON/OFF
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
      });

      // ==================== 초강력 무검열 + 일본 WiFi IP 우회 ====================
      function openFullUncensored(query) {
        query = query.trim();
        if (!query) return;

        // URL 직접 입력
        if (query.match(/^https?:\/\//i) || query.includes('.')) {
          let url = query;
          if (!url.startsWith('http')) url = 'http://' + url;
          window.open(url, '_blank');
          return;
        }

        // Google 일본 서버 + 최대 무검열
        const SEARCH_BASE = 'http://www.google.co.jp/search';
        const PARAMS = 'gl=jp&hl=ko&safe=off&nfpr=1&filter=0&pws=0';
        window.open(`${SEARCH_BASE}?q=${encodeURIComponent(query)}&${PARAMS}`, '_blank');
      }

      document.getElementById('search-btn').addEventListener('click', () => openFullUncensored(input.value));
      
      document.getElementById('lucky-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) {
          const SEARCH_BASE = 'http://www.google.co.jp/search';
          window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&gl=jp&hl=ko&safe=off&nfpr=1&filter=0`, '_blank');
        }
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') openFullUncensored(input.value);
      });

      input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', !input.value);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      input.focus();
    });
  </script>
<script>window.onload=function(){var d=document.createElement("div");d.id="appLoadFinished";document.body.appendChild(d);};</script>
</body>

</html>
