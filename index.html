  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0010
        url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg')
        center / cover no-repeat fixed;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #e9d5ff;
    }

    /* ── Search bar ── */
    .search-bar {
      border: 1px solid rgba(192,132,252,0.6);
      border-radius: 9999px;
      background: rgba(12,4,28,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .search-bar:focus-within {
      border-color: #c084fc;
      box-shadow: 0 0 30px rgba(192,132,252,0.7);
    }

    /* ── Suggestions dropdown ── */
    #suggestions {
      background: rgba(12,4,28,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(192,132,252,0.4);
      border-top: none;
      border-radius: 0 0 1.5rem 1.5rem;
      overflow: hidden;
    }
    #suggestions li {
      padding: 10px 20px;
      cursor: pointer;
      color: #d8b4fe;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
    }
    #suggestions li:hover { background: rgba(192,132,252,0.15); }

    /* ── Toggle button ── */
    #toggle-main-btn {
      width: 44px; height: 44px;
      background: rgba(12,4,28,0.95);
      border: 2px solid #c084fc;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #toggle-main-btn:hover {
      background: #a855f7;
      transform: scale(1.12);
    }

    /* ── Hidden state ── */
    #main-content.is-hidden { display: none !important; }

    /* ── Japan WiFi badge ── */
    .japan-wifi {
      position: fixed;
      top: 14px;
      right: 220px;
      background: linear-gradient(90deg,#22c55e,#86efac);
      color: #052e16;
      padding: 6px 18px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 900;
      z-index: 500;
      box-shadow: 0 0 20px #22c55e88;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Apps popup ── */
    #apps-popup {
      display: none;
      position: fixed;
      top: 60px;
      right: 16px;
      background: rgba(12,4,28,0.97);
      border: 1px solid rgba(192,132,252,0.4);
      border-radius: 16px;
      padding: 16px;
      z-index: 600;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 280px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #apps-popup.open { display: block; }
    .app-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .app-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 6px;
      border-radius: 12px;
      color: #d8b4fe;
      font-size: 11px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .app-item:hover { background: rgba(192,132,252,0.2); color: #fff; }
    .app-item i { font-size: 22px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .japan-wifi {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        padding: 5px 12px;
        top: 8px;

  <!-- ════════════ SCRIPTS ════════════ -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      /* ── DOM refs ── */
      var input       = document.getElementById('search-input');
      var clearBtn    = document.getElementById('clear-btn');
      var searchBtn   = document.getElementById('search-btn');
      var luckyBtn    = document.getElementById('lucky-btn');
      var toggleBtn   = document.getElementById('toggle-main-btn');
      var mainContent = document.getElementById('main-content');
      var appsBtn     = document.getElementById('apps-btn');
      var appsPopup   = document.getElementById('apps-popup');
      var suggestions = document.getElementById('suggestions');

      var isHidden = false;

      /* ── 로고 + 검색바 ON/OFF ── */
      toggleBtn.addEventListener('click', function () {
        isHidden = !isHidden;
        mainContent.classList.toggle('is-hidden', isHidden);
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
      });

      /* ── Apps popup ── */
      appsBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        appsPopup.classList.toggle('open');
      });
      document.addEventListener('click', function () {
        appsPopup.classList.remove('open');
      });
      appsPopup.addEventListener('click', function (e) { e.stopPropagation(); });

      /* ── 검색 실행 ── */
      function openSearch(query, lucky) {
        query = (query || '').trim();
        if (!query) { input.focus(); return; }

        var isURL = /^https?:\/\//i.test(query) ||
                    /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(query);
        if (isURL) {
          var url = /^https?:\/\//i.test(query) ? query : 'https://' + query;
          window.open(url, '_blank');
          return;
        }

        var base   = 'https://www.google.co.jp/search';
        var params = 'gl=jp&hl=ko&safe=off&nfpr=1&filter=0&pws=0';
        var suffix = lucky ? '&btnI=1' : '';
        window.open(base + '?q=' + encodeURIComponent(query) + '&' + params + suffix, '_blank');
      }

      searchBtn.addEventListener('click', function () { openSearch(input.value, false); });
      luckyBtn.addEventListener('click',  function () { openSearch(input.value, true);  });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { openSearch(input.value, false); hideSuggestions(); }
        if (e.key === 'Escape') { hideSuggestions(); }
      });

      /* ── Clear button ── */
      input.addEventListener('input', function () {
        clearBtn.classList.toggle('hidden', !input.value);
        if (input.value.length >= 2) {
          fetchSuggestions(input.value);
        } else {
          hideSuggestions();
        }
      });
      clearBtn.addEventListener('click', function () {
        input.value = '';
        clearBtn.classList.add('hidden');
        hideSuggestions();
        input.focus();
      });

      /* ── Autocomplete suggestions (CORS-safe via jsonp approach) ── */
      var suggestTimer = null;

      function fetchSuggestions(query) {
        clearTimeout(suggestTimer);
        suggestTimer = setTimeout(function () {
          var script = document.createElement('script');
          script.id  = 'suggest-script';
          window._suggestCb = function (data) {
            var old = document.getElementById('suggest-script');
            if (old) old.remove();
            renderSuggestions(data[1] || []);
          };
          script.src = 'https://suggestqueries.google.com/complete/search?client=firefox&q='
                       + encodeURIComponent(query) + '&callback=_suggestCb';
          var prev = document.getElementById('suggest-script');
          if (prev) prev.remove();
          document.body.appendChild(script);
        }, 200);
      }

      function renderSuggestions(items) {
        if (!items.length) { hideSuggestions(); return; }
        suggestions.innerHTML = '';
        items.slice(0, 6).forEach(function (text) {
          var li = document.createElement('li');
          li.setAttribute('role', 'option');
          li.innerHTML = '<i class="fa-solid fa-magnifying-glass text-purple-500"></i><span>' +
                         escapeHTML(text) + '</span>';
          li.addEventListener('mousedown', function (e) {
            e.preventDefault();
            input.value = text;
            clearBtn.classList.remove('hidden');
            hideSuggestions();
            openSearch(text, false);
          });
          suggestions.appendChild(li);
        });
        suggestions.classList.remove('hidden');
      }

      function hideSuggestions() {
        suggestions.classList.add('hidden');
        suggestions.innerHTML = '';
      }

      function escapeHTML(str) {
        return str.replace(/&/g,'&amp;')
                  .replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;');
      }

      document.addEventListener('click', function (e) {
        if (!input.contains(e.target) && !suggestions.contains(e.target)) {
          hideSuggestions();
        }
      });

      /* ── Auto focus ── */
      input.focus();
    });
  </script>
  <!-- App load signal for OnSpace preview -->
  <script>
    window.onload = function () {
      var d = document.createElement('div');
      d.id = 'appLoadFinished';
      document.body.appendChild(d);
    };
  </script>
