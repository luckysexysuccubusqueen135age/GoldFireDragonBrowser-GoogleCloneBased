<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FireDragon Browser</title>

  <meta name="user-agent" content="Mozilla/9.0 (Windows NT 10.0; Win64; x64) Gecko/20100101 FireDragon/135.0 stealth privatebrowsing incognito windowedfullscreen"/>
  <meta name="location" content="Japan"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0010 url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg') center/cover no-repeat fixed;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #e9d5ff;
    }

    .search-bar {
      border: 1px solid rgba(200,160,255,0.4);
      border-radius: 9999px;
      background: rgba(12, 4, 28, 0.75);
      backdrop-filter: blur(20px);
    }
    .search-bar:focus-within { border-color: #f59e0b; box-shadow: 0 0 25px rgba(245,158,11,0.5); }

    #toggle-main-btn {
      width: 42px; height: 42px;
      background: rgba(12,4,28,0.85);
      border: 1px solid rgba(168,85,247,0.5);
      border-radius: 50%;
      font-size: 22px;
      transition: all 0.3s ease;
    }
    #toggle-main-btn:hover {
      background: #a855f7;
      transform: scale(1.1);
      border-color: #f59e0b;
    }

    #main-content.hidden { display: none !important; }

    .ua-info {
      position: fixed; bottom: 12px; left: 12px;
      font-size: 11px; padding: 5px 12px; border-radius: 9999px;
      background: rgba(12,4,28,0.8); border: 1px solid #a855f7;
      z-index: 999;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- TOP NAV -->
  <header class="flex justify-end items-center px-6 py-4 gap-4" style="background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);">
    <a href="#" class="hover:underline">Gmail</a>
    <a href="#" class="hover:underline">이미지</a>

    <button id="apps-btn" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10">
      <i class="fa-solid fa-grid-2 text-xl"></i>
    </button>

    <!-- 🔥 로고+검색 완전 숨김 버튼 -->
    <button id="toggle-main-btn" title="로고 + 검색창 숨기기 / 보이기">
      👁️
    </button>

    <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
         class="w-8 h-8 rounded-full cursor-pointer" title="FireDragon 계정">
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="flex-1 flex flex-col items-center justify-center px-4">
    <!-- Logo -->
    <div class="mb-10 text-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           class="mx-auto mb-4" style="width: clamp(100px, 18vw, 180px);" draggable="false">
      <div class="text-5xl font-black tracking-widest bg-gradient-to-r from-purple-400 via-amber-400 to-purple-400 bg-clip-text text-transparent">
        FireDragon
      </div>
      <div class="text-sm text-purple-300 mt-2">
        135.0 • Stealth • Private • Incognito • 🇯🇵 일본
      </div>
    </div>

    <!-- Search Bar -->
    <div class="w-full max-w-[620px]">
      <div class="search-bar flex items-center px-6 py-4 shadow-2xl">
        <i class="fa-solid fa-magnifying-glass text-purple-400 text-2xl mr-4"></i>
        <input id="search-input" type="text" 
               class="flex-1 bg-transparent outline-none text-lg placeholder:text-purple-300"
               placeholder="검색하거나 URL을 입력하세요" autocomplete="off">
        <button id="clear-btn" class="hidden text-2xl text-purple-400 hover:text-white mr-3">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button class="text-2xl text-purple-500 hover:text-purple-300 mr-3"><i class="fa-solid fa-microphone"></i></button>
        <button class="text-2xl text-amber-400 hover:text-amber-300"><i class="fa-solid fa-image"></i></button>
      </div>

      <!-- 검색 버튼 -->
      <div class="flex justify-center gap-4 mt-8">
        <button id="search-btn" class="px-8 py-3 bg-white/10 hover:bg-white/20 border border-purple-400 rounded-xl text-sm font-medium transition">
          FireDragon 검색
        </button>
        <button id="lucky-btn" class="px-8 py-3 bg-white/10 hover:bg-white/20 border border-purple-400 rounded-xl text-sm font-medium transition">
          I'm Feeling Lucky
        </button>
      </div>
    </div>
  </main>

  <!-- Status -->
  <div class="ua-info">
    🇯🇵 일본 • FireDragon/135.0 • Stealth Private Incognito
  </div>

  <!-- Footer -->
  <footer class="mt-auto py-4 text-sm text-purple-300 border-t border-purple-900/50 bg-black/40">
    <div class="max-w-5xl mx-auto px-6 flex flex-wrap justify-between items-center">
      <div>🇯🇵 일본</div>
      <div class="flex gap-6">
        <a href="#" class="hover:text-amber-400">광고</a>
        <a href="#" class="hover:text-amber-400">비즈니스</a>
        <a href="#" class="hover:text-amber-400">검색의 원리</a>
        <a href="#" class="hover:text-amber-400">개인정보처리방침</a>
        <a href="#" class="hover:text-amber-400">이용약관</a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const mainContent = document.getElementById('main-content');
      const toggleBtn = document.getElementById('toggle-main-btn');

      let isHidden = false;

      // ==================== 토글 버튼 (완전 작동) ====================
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        
        toggleBtn.innerHTML = isHidden ? '🔄' : '👁️';
        toggleBtn.title = isHidden ? "로고 + 검색창 보이기" : "로고 + 검색창 숨기기";
      });

      // ==================== 검색 기능 (일본 + 한국어) ====================
      const SEARCH_BASE = 'https://www.google.co.jp/search';
      const PARAMS = 'gl=jp&hl=ko&safe=off';

      function doSearch() {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&${PARAMS}`, '_blank');
      }

      document.getElementById('search-btn').addEventListener('click', doSearch);
      document.getElementById('lucky-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&${PARAMS}`, '_blank');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });

      // ==================== Clear 버튼 ====================
      input.addEventListener('input', () => {
        clearBtn.classList.toggle('hidden', input.value.length === 0);
      });

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        input.focus();
      });

      // Enter키로 검색, ESC로 입력창 비우기
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.activeElement === input) {
          input.value = '';
          clearBtn.classList.add('hidden');
        }
      });

      // 포커스 시 입력창 강조
      input.focus();
    });
  </script>
</body>
</html>
