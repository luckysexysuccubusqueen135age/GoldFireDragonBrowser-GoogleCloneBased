<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FireDragon Browser</title>

  <!-- User-Agent + Japan Location -->
  <meta name="user-agent" content="Mozilla/9.0 (Windows NT 10.0; Win64; x64) Gecko/20100101 FireDragon/135.0 stealth privatebrowsing incognito windowedfullscreen"/>
  <meta name="location" content="Japan"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #0a0010;
      background-image: url('https://cdn-ai.onspace.ai/onspace/project/uploads/6SC2bAVvqSFMEGrGCS7FCM/GoldFireDragonBrowser_home_page.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .search-bar { 
      border: 1px solid rgba(200,160,255,0.35); 
      border-radius: 24px; 
      background: rgba(12, 4, 28, 0.65); 
      backdrop-filter: blur(16px); 
      transition: box-shadow 0.2s ease, border-color 0.2s ease; 
    }
    .search-bar:hover { box-shadow: 0 2px 18px rgba(168,85,247,0.4); border-color: rgba(245,158,11,0.55); }
    .search-bar:focus-within { box-shadow: 0 2px 24px rgba(168,85,247,0.55); border-color: rgba(245,158,11,0.8); }

    .g-btn {
      background: rgba(12, 4, 28, 0.6); 
      border: 1px solid rgba(200,160,255,0.3); 
      border-radius: 6px;
      color: #e9d5ff; 
      font-size: 14px; 
      padding: 0 18px; 
      height: 36px; 
      cursor: pointer;
    }
    .g-btn:hover { 
      border-color: rgba(245,158,11,0.75); 
      background: rgba(168,85,247,0.28); 
      color: #fff; 
    }

    #toggle-main-btn {
      background: rgba(12, 4, 28, 0.7); 
      border: 1px solid rgba(200,160,255,0.4);
      color: #e9d5ff; 
      width: 36px; 
      height: 36px; 
      border-radius: 50%;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer;
    }
    #toggle-main-btn:hover { 
      background: rgba(168,85,247,0.3); 
      border-color: #f59e0b; 
      transform: scale(1.1); 
    }

    .ua-info {
      position: fixed; 
      bottom: 12px; 
      left: 12px; 
      font-size: 11px; 
      color: #a78bfa; 
      background: rgba(12,4,28,0.7); 
      padding: 4px 10px; 
      border-radius: 9999px;
      border: 1px solid rgba(168,85,247,0.3); 
      backdrop-filter: blur(8px);
      z-index: 200;
    }

    .location-jp { color: #f59e0b; font-weight: 600; }

    #main-content.hidden { display: none !important; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- ===== TOP NAV ===== -->
  <header class="flex justify-end items-center px-4 py-3 gap-2 flex-shrink-0" style="background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);">
    <a href="#" class="top-link">Gmail</a>
    <a href="#" class="top-link">이미지</a>

    <div class="relative" id="apps-wrapper">
      <button class="icon-btn" id="apps-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#c4b5fd">
          <path d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 14c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path>
        </svg>
      </button>
    </div>

    <!-- 토글 버튼 -->
    <button id="toggle-main-btn" title="로고 + 검색바 숨기기/보이기">
      <i class="fa-solid fa-eye" style="font-size:18px;"></i>
    </button>

    <div class="ml-1 cursor-pointer" title="FireDragon 계정">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" style="width:32px;height:32px;border-radius:50%;" alt="avatar"/>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main-content" class="flex flex-col items-center justify-center flex-1 px-4 transition-all duration-300" style="margin-top: -60px;">
    
    <!-- Logo -->
    <div class="mb-7 select-none flex flex-col items-center">
      <img src="https://cdn-ai.onspace.ai/onspace/project/uploads/cNeEsZ2cuNyHxmYfJ3dhx6/GoldFireDragonBrowser_logo-removebg-preview.png" 
           style="width: clamp(80px, 14vw, 130px); height: auto; filter: drop-shadow(0 4px 20px rgba(168,85,247,0.6)) drop-shadow(0 0 40px rgba(245,158,11,0.25));" 
           draggable="false"/>
      <div style="font-size: clamp(24px, 4.5vw, 38px); font-family: 'Arial Black', sans-serif; font-weight: 900; letter-spacing: 2px; margin-top: 8px; 
                  background: linear-gradient(90deg, #c084fc 0%, #f59e0b 45%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        FireDragon
      </div>
      <div class="text-xs text-purple-300 mt-1 flex items-center gap-2">
        <span>135.0 • Stealth • Incognito</span> 
        <span class="location-jp">🇯🇵 일본</span>
      </div>
    </div>

    <!-- Search -->
    <div class="w-full max-w-[584px]">
      <div class="search-wrap relative" id="search-wrap">
        <div class="search-bar flex items-center px-4 py-3 gap-3">
          <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
            <path fill="#c084fc" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
          </svg>
          <input id="search-input" type="text" class="flex-1 bg-transparent border-none outline-none text-[#f3e8ff] text-[16px]" 
                 placeholder="검색 또는 URL 입력" spellcheck="false"/>
          <div class="flex items-center gap-1">
            <button class="icon-btn" id="clear-btn" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-microphone" style="color:#a855f7;"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-image" style="color:#f59e0b;"></i></button>
          </div>
        </div>
        <div class="suggestions-box" id="suggestions-box"></div>
      </div>

      <div class="flex justify-center gap-3 mt-7">
        <button class="g-btn" id="search-btn">FireDragon 검색</button>
        <button class="g-btn" id="lucky-btn">I'm Feeling Lucky</button>
      </div>
    </div>
  </main>

  <!-- UA + Japan Info -->
  <div class="ua-info">
    🇯🇵 일본 • FireDragon/135.0 • Stealth Private Incognito
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="flex-shrink-0" style="background: rgba(8,2,18,0.75); border-top: 1px solid rgba(168,85,247,0.2); backdrop-filter: blur(12px);">
    <div class="px-5 py-3 text-sm flex items-center" style="color:rgba(196,160,255,0.6); border-bottom: 1px solid rgba(168,85,247,0.12);">
      <span class="location-jp">🇯🇵 일본</span>
    </div>
    <div class="px-5 py-3 flex flex-col sm:flex-row justify-between items-center gap-2 text-sm">
      <div class="flex flex-wrap gap-x-4 gap-y-1">
        <a href="#" class="foot-link">광고</a>
        <a href="#" class="foot-link">비즈니스</a>
        <a href="#" class="foot-link">검색의 원리</a>
      </div>
      <div class="flex flex-wrap gap-x-4 gap-y-1">
        <a href="#" class="foot-link">개인정보처리방침</a>
        <a href="#" class="foot-link">이용약관</a>
        <a href="#" class="foot-link">설정</a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-btn');
      const toggleBtn = document.getElementById('toggle-main-btn');
      const mainContent = document.getElementById('main-content');

      let isHidden = false;

      // 토글 버튼
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden;
        mainContent.classList.toggle('hidden', isHidden);
        toggleBtn.innerHTML = isHidden 
          ? `<i class="fa-solid fa-eye-slash" style="font-size:18px;"></i>` 
          : `<i class="fa-solid fa-eye" style="font-size:18px;"></i>`;
      });

      // 일본 Google 검색 (위치 일본 유지)
      const SEARCH_BASE = 'https://www.google.co.jp/search';
      const SEARCH_PARAMS = 'gl=jp&hl=ko&safe=off';   // hl=ko : 검색 결과는 한국어

      function doSearch() {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&${SEARCH_PARAMS}`, '_blank');
      }

      document.getElementById('search-btn').addEventListener('click', doSearch);
      document.getElementById('lucky-btn').addEventListener('click', () => {
        const q = input.value.trim();
        if (q) window.open(`${SEARCH_BASE}?q=${encodeURIComponent(q)}&btnI=1&${SEARCH_PARAMS}`, '_blank');
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });

      input.addEventListener('input', () => {
        clearBtn.style.display = input.value ? 'flex' : 'none';
      });
      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.style.display = 'none';
        input.focus();
      });
    });
  </script>
</body>
</html>
